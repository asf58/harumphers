<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARUMPHERS Directory</title>
  <meta name="theme-color" content="#8B0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    header img {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-links {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    .back-link, .logout-link {
      color: #FFD700;
      text-decoration: none;
      font-size: 13px;
      white-space: nowrap;
    }

    .logout-link { opacity: 0.7; }
    .logout-link:hover { opacity: 1; }

    @media (max-width: 380px) {
      header { padding: 10px 12px; gap: 8px; }
      header h1 { font-size: 16px; }
      .header-links { gap: 8px; }
      .back-link, .logout-link { font-size: 12px; }
    }

    .admin-bar {
      display: flex;
      justify-content: flex-end;
      padding: 8px 16px 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-bar {
      padding: 12px 16px;
      background: #222;
      position: sticky;
      top: 60px;
      z-index: 9;
    }

    .search-bar input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .search-bar input::placeholder { color: #888; }
    .search-bar input:focus { border-color: #FFD700; }

    .member-count {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      color: #888;
    }

    .view-toggle-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 4px 16px 0;
    }
    .view-toggle-bar button {
      background: #2a2a2a;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      cursor: pointer;
      font: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .view-toggle-bar button:hover { color: #ccc; border-color: #444; }
    .view-toggle-bar button.active {
      color: #FFD700;
      border-color: #FFD700;
      background: rgba(255,215,0,0.08);
    }
    .view-toggle-bar svg { width: 14px; height: 14px; }

    .members {
      padding: 8px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Grid view overrides .members layout */
    .members.grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      max-width: 720px;
    }
    /* Phone portrait: force 3 columns and shrink avatars/spacing to fit.
       Selectors scoped under .members.grid-view to win specificity vs the
       base .grid-avatar / .grid-card rules that appear later in the file. */
    @media (max-width: 480px) {
      .members.grid-view {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        padding-left: 10px;
        padding-right: 10px;
      }
      .members.grid-view .grid-avatar,
      .members.grid-view .grid-initials {
        width: 78px;
        height: 78px;
      }
      .members.grid-view .grid-initials { font-size: 22px; }
      .members.grid-view .grid-card { padding: 10px 4px 8px; gap: 6px; }
      .members.grid-view .grid-name { font-size: 11px; }
    }
    .grid-card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 12px 6px 10px;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
      overflow: hidden;
    }
    .grid-card:active { background: #333; }
    .grid-avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      background: #444;
      display: block;
    }
    .grid-initials {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #8B0000;
      color: #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 26px;
    }
    .grid-name {
      font-size: 12px;
      font-weight: 500;
      color: #ddd;
      line-height: 1.25;
      width: 100%;
      word-break: break-word;
    }
    .grid-card .grid-badges {
      display: flex;
      gap: 4px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .grid-card .you-badge,
    .grid-card .admin-badge { font-size: 9px; padding: 1px 5px; }

    .card {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .card:active { background: #333; }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: #444;
    }

    .initials {
      width: 112px;
      height: 112px;
      border-radius: 12px;
      background: #8B0000;
      color: #FFD700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
      flex-shrink: 0;
    }

    .info { flex: 1; min-width: 0; }

    .name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .contact a {
      color: #FFD700;
      text-decoration: none;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact a:active { opacity: 0.7; }

    .loading, .error {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #ff6b6b; }

    .error a {
      color: #FFD700;
      display: inline-block;
      margin-top: 12px;
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      overflow-y: auto;
      padding: 20px;
    }

    .overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .detail {
      background: #2a2a2a;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      padding: 32px 24px;
      text-align: center;
      position: relative;
    }

    .detail-close {
      position: absolute;
      top: 12px;
      right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .detail-close:active { color: #fff; }

    .detail .avatar {
      width: 180px;
      height: 180px;
      border-radius: 16px;
      margin: 0 auto 16px;
      display: block;
    }

    .detail .initials {
      width: 180px;
      height: 180px;
      border-radius: 16px;
      font-size: 56px;
      margin: 0 auto 16px;
    }

    .detail-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .detail-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
    }

    .detail-btn.call {
      background: #FFD700;
      color: #8B0000;
    }

    .detail-btn.email {
      background: rgba(255,215,0,0.15);
      color: #FFD700;
      border: 1px solid #FFD700;
    }

    .detail-btn.edit {
      background: rgba(255,255,255,0.1);
      color: #aaa;
      border: 1px solid #555;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .detail-btn.sms {
      background: rgba(76,175,80,0.15);
      color: #81C784;
      border: 1px solid rgba(76,175,80,0.4);
    }

    .detail-btn.contact {
      background: rgba(100,149,237,0.15);
      color: #6495ED;
      border: 1px solid rgba(100,149,237,0.4);
    }

    .detail-btn:active { opacity: 0.7; }

    .detail-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Edit / Admin edit form */
    .edit-form {
      text-align: left;
      margin-top: 16px;
      border-top: 1px solid #444;
      padding-top: 16px;
    }

    .edit-form-title {
      font-size: 15px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 12px;
      text-align: center;
    }

    .edit-field {
      margin-bottom: 10px;
    }

    .edit-field label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .edit-field input, .edit-field textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
    }

    .edit-field input:focus, .edit-field textarea:focus {
      border-color: #FFD700;
    }

    .edit-field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .edit-field input[type="file"] {
      padding: 8px;
      font-size: 13px;
    }

    .edit-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #FFD700;
      color: #8B0000;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
    }

    .edit-submit:active { opacity: 0.7; }
    .edit-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .edit-msg {
      text-align: center;
      padding: 8px 0 0;
      font-size: 13px;
      min-height: 24px;
    }

    .edit-msg.success { color: #4CAF50; }
    .edit-msg.error { color: #ff6b6b; }

    .edit-note {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }

    .you-badge {
      display: inline-block;
      font-size: 10px;
      background: rgba(255,215,0,0.2);
      color: #FFD700;
      padding: 1px 6px;
      border-radius: 6px;
      margin-left: 6px;
      font-weight: 600;
      vertical-align: middle;
    }

    .admin-badge {
      display: inline-block;
      font-size: 10px;
      background: rgba(139,0,0,0.35);
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.5);
      padding: 1px 6px;
      border-radius: 6px;
      margin-left: 6px;
      font-weight: 700;
      letter-spacing: 0.5px;
      vertical-align: middle;
    }

    .detail-btn.admin-toggle {
      background: rgba(139,0,0,0.25);
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.4);
      cursor: pointer;
      font-family: inherit;
    }

    .detail-btn.admin-toggle.remove {
      background: rgba(255,107,107,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,107,107,0.4);
    }

    /* Export feature (admin only) */
    .export-trigger {
      background: #444;
      color: #FFD700;
      border: 1px solid #666;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .export-trigger:active { opacity: 0.7; }

    .export-panel {
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 14px;
      margin: 8px 16px 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .export-panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 10px;
    }
    .export-count {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .export-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .export-action-btn {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #555;
      background: #333;
      color: #fff;
      font-family: inherit;
    }
    .export-action-btn:active { opacity: 0.7; }
    .export-action-btn.email { background: #2a6496; border-color: #2a6496; }
    .export-action-btn.sms { background: #4CAF50; border-color: #4CAF50; }
    .export-action-btn.copy { background: #555; border-color: #666; }
    .export-msg {
      font-size: 12px;
      color: #4CAF50;
      min-height: 18px;
      margin-top: 8px;
    }
    .export-msg.error { color: #ff6b6b; }
  </style>
</head>
<body>
  <header>
    <img src="apple-touch-icon.png" alt="">
    <h1>HARUMPHERS</h1>
    <div class="header-links">
      <a href="index.html" class="back-link">Home</a>
      <a href="events.html" class="back-link">Events</a>
      <a href="#" class="logout-link" onclick="logout()">Logout</a>
    </div>
  </header>

  <div class="search-bar">
    <input type="search" id="search" placeholder="Search members..." autocomplete="off">
  </div>

  <div class="view-toggle-bar">
    <button id="view-list-btn" onclick="setViewMode('list')" title="List view (full contact info)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H2zM2 7h12v2H2zM2 11h12v2H2z"/></svg>List
    </button>
    <button id="view-grid-btn" onclick="setViewMode('grid')" title="Grid view (photo gallery)">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2zM9 2h5v5H9zM2 9h5v5H2zM9 9h5v5H9z"/></svg>Grid
    </button>
  </div>

  <div id="admin-bar" class="admin-bar" style="display:none">
    <button id="export-trigger" class="export-trigger" onclick="toggleExportPanel()">Export</button>
  </div>

  <div id="export-panel-host"></div>

  <div id="count" class="member-count"></div>
  <div id="content" class="members">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading directory...</p>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="detail" id="detail"></div>
  </div>

  <script>
    // --- Auth Helpers ---
    function getAuthMode() {
      const auth = localStorage.getItem('harumphers_auth');
      if (auth === 'admin') return 'admin';
      if (auth === 'member') return 'member';
      if (auth === 'guest' || auth === '1') return 'guest';
      return null;
    }

    function getMemberInfo() {
      const recordId = localStorage.getItem('harumphers_member_id');
      const name = localStorage.getItem('harumphers_member_name');
      const duqId = localStorage.getItem('harumphers_duq_id');
      if (!recordId) return null;
      return { recordId, name, duqId };
    }

    function logout() {
      localStorage.removeItem('harumphers_auth');
      localStorage.removeItem('harumphers_member_id');
      localStorage.removeItem('harumphers_member_name');
      localStorage.removeItem('harumphers_duq_id');
      localStorage.removeItem('harumphers_myname');
      window.location.href = 'index.html';
    }

    function requireAuth() {
      if (!getAuthMode()) {
        window.location.href = 'index.html';
        return false;
      }
      return true;
    }

    if (!requireAuth()) throw new Error('Not authenticated');

    const authMode = getAuthMode();
    const myInfo = getMemberInfo();

    const API_TOKEN = 'patUyXb57QcsCO19p.0087dc0d916011881f3d3116ec8f314b422dcd0c05f37c4a5cfd8cd65350a76c';
    const BASE_ID = 'appW7Df1qJlznxxtf';
    const TABLE_ID = 'tbltzPyERz9wGE0zd';
    const CHANGES_TABLE = 'tbljI55IdCDB0uFuS';

    let allMembers = [];
    let allRecords = [];
    let lastRendered = [];
    let exportPanelOpen = false;

    async function applyApprovedChanges() {
      try {
        const res = await fetch(
          `https://api.airtable.com/v0/${BASE_ID}/${CHANGES_TABLE}?filterByFormula=AND({STATUS}="Approved",{APPLIED AT}=BLANK())`,
          { headers: { 'Authorization': `Bearer ${API_TOKEN}` } }
        );
        if (!res.ok) return;
        const data = await res.json();
        for (const rec of data.records) {
          const f = rec.fields;
          const memberId = f['MEMBER RECORD ID'];
          const changes = f['REQUESTED CHANGES'] || '';
          if (!memberId) continue;

          const updates = {};
          for (const line of changes.split('\n')) {
            const match = line.match(/^(.+?):\s*.+?\s*->\s*(.+)$/);
            if (!match) continue;
            const field = match[1].trim();
            const newVal = match[2].trim();
            if (field === 'Name') updates['FULL NAME'] = newVal;
            else if (field === 'Phone') updates['CELL #'] = newVal;
            else if (field === 'Email') updates['E-MAIL ADDRESS'] = newVal;
          }

          if (Object.keys(updates).length > 0) {
            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${memberId}`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ fields: updates })
            });
          }

          await fetch(`https://api.airtable.com/v0/${BASE_ID}/${CHANGES_TABLE}/${rec.id}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { 'APPLIED AT': new Date().toISOString() } })
          });
        }
      } catch (e) {
        console.log('Auto-apply check:', e.message);
      }
    }

    async function apiFetchAll(url) {
      let allRecords = [];
      let fetchUrl = url;
      while (true) {
        const res = await fetch(fetchUrl, {
          headers: { 'Authorization': `Bearer ${API_TOKEN}` }
        });
        if (!res.ok) throw new Error(`API error ${res.status}`);
        const data = await res.json();
        allRecords = allRecords.concat(data.records);
        if (!data.offset) break;
        const sep = fetchUrl.includes('?') ? '&' : '?';
        fetchUrl = url + sep + 'offset=' + encodeURIComponent(data.offset);
      }
      return { records: allRecords };
    }

    async function loadDirectory() {
      const params = new URLSearchParams({
        'filterByFormula': '{IN DIRECTORY}=TRUE()',
        'sort[0][field]': 'LAST NAME',
        'sort[0][direction]': 'asc',
      });
      ['FULL NAME', 'PHOTO', 'CELL #', 'E-MAIL ADDRESS', 'MEMBER #', 'IS ADMIN'].forEach(f => {
        params.append('fields[]', f);
      });

      const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?${params}`;

      const data = await apiFetchAll(url);
      allRecords = data.records;
      allMembers = data.records.map(r => {
        const f = r.fields;
        const photo = f['PHOTO'] && f['PHOTO'][0];
        return {
          recordId: r.id,
          name: f['FULL NAME'] || '',
          phone: f['CELL #'] || '',
          email: f['E-MAIL ADDRESS'] || '',
          memberNum: f['MEMBER #'] || '',
          isAdmin: f['IS ADMIN'] === true,
          photoUrl: photo && photo.thumbnails && photo.thumbnails.large
            ? photo.thumbnails.large.url : null,
        };
      });

      render(allMembers);
    }

    // View mode: 'list' (current) or 'grid' (photo gallery). Persisted across sessions.
    let viewMode = localStorage.getItem('harumphers_view_mode') === 'grid' ? 'grid' : 'list';

    function setViewMode(mode) {
      if (mode !== 'list' && mode !== 'grid') return;
      viewMode = mode;
      localStorage.setItem('harumphers_view_mode', mode);
      updateViewToggleButtons();
      render(lastRendered.length ? lastRendered : allMembers);
    }

    function updateViewToggleButtons() {
      const lBtn = document.getElementById('view-list-btn');
      const gBtn = document.getElementById('view-grid-btn');
      if (lBtn) lBtn.classList.toggle('active', viewMode === 'list');
      if (gBtn) gBtn.classList.toggle('active', viewMode === 'grid');
    }

    function initialsFor(name) {
      const words = (name || '').split(/\s+/);
      return words.length > 1
        ? `${words[0][0]}${words[words.length-1][0]}`.toUpperCase()
        : (words[0] || '').substring(0,2).toUpperCase();
    }

    function buildListCardHtml(m, idx) {
      const name = m.name;
      const initials = initialsFor(name);
      const avatarHtml = m.photoUrl
        ? `<img class="avatar" src="${m.photoUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'initials\\'>${initials}</div>'">`
        : `<div class="initials">${initials}</div>`;
      let contactHtml = '';
      if (m.phone) {
        const digits = m.phone.replace(/\D/g, '');
        contactHtml += `<a href="tel:+1${digits}">${m.phone}</a>`;
      }
      if (m.email) {
        contactHtml += `<a href="mailto:${m.email}">${m.email}</a>`;
      }
      const isMe = myInfo && m.recordId === myInfo.recordId;
      const youBadge = isMe ? '<span class="you-badge">You</span>' : '';
      const adminBadge = (authMode === 'admin' && m.isAdmin) ? '<span class="admin-badge">ADMIN</span>' : '';
      return `<div class="card" onclick="showDetail(${idx})">
        ${avatarHtml}
        <div class="info">
          <div class="name">${name}${youBadge}${adminBadge}</div>
          <div class="contact">${contactHtml}</div>
        </div>
      </div>`;
    }

    function buildGridCardHtml(m, idx) {
      const name = m.name;
      const initials = initialsFor(name);
      const avatarHtml = m.photoUrl
        ? `<img class="grid-avatar" src="${m.photoUrl}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'grid-initials\\'>${initials}</div>'">`
        : `<div class="grid-initials">${initials}</div>`;
      const isMe = myInfo && m.recordId === myInfo.recordId;
      const youBadge = isMe ? '<span class="you-badge">You</span>' : '';
      const adminBadge = (authMode === 'admin' && m.isAdmin) ? '<span class="admin-badge">ADMIN</span>' : '';
      const badges = (youBadge || adminBadge) ? `<div class="grid-badges">${youBadge}${adminBadge}</div>` : '';
      return `<div class="grid-card" onclick="showDetail(${idx})">
        ${avatarHtml}
        <div class="grid-name">${name}</div>
        ${badges}
      </div>`;
    }

    function render(members) {
      const content = document.getElementById('content');
      const countEl = document.getElementById('count');
      lastRendered = members;
      renderExportPanel();

      // Toggle the grid-view class on the container so CSS picks up the right layout
      content.classList.toggle('grid-view', viewMode === 'grid');

      if (members.length === 0) {
        content.innerHTML = '<div class="no-results">No members found</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = `${members.length} member${members.length !== 1 ? 's' : ''}`;

      const builder = viewMode === 'grid' ? buildGridCardHtml : buildListCardHtml;
      content.innerHTML = members.map(m => builder(m, allMembers.indexOf(m))).join('');
    }

    // Reflect the persisted view mode in the toggle buttons on page load
    updateViewToggleButtons();

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) { render(allMembers); return; }
      const filtered = allMembers.filter(m =>
        `${m.name} ${m.phone} ${m.email}`.toLowerCase().includes(q)
      );
      render(filtered);
    });

    let editFormVisible = false;

    function showDetail(idx) {
      editFormVisible = false;
      const m = allMembers[idx];
      if (!m) return;
      renderDetail(idx);
      document.getElementById('overlay').classList.add('open');
    }

    function renderDetail(idx) {
      const m = allMembers[idx];
      const name = m.name;
      const words = name.split(/\s+/);
      const initials = words.length > 1
        ? `${words[0][0]}${words[words.length-1][0]}`.toUpperCase()
        : (words[0] || '').substring(0,2).toUpperCase();

      const avatarHtml = m.photoUrl
        ? `<img class="avatar" src="${m.photoUrl}" alt="" onerror="this.outerHTML='<div class=\\'initials\\'>${initials}</div>'">`
        : `<div class="initials">${initials}</div>`;

      const isMe = myInfo && m.recordId === myInfo.recordId;

      let actionsHtml = '';
      if (m.phone) {
        const digits = m.phone.replace(/\D/g, '');
        actionsHtml += `<a class="detail-btn call" href="tel:+1${digits}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.25 1.02l-2.2 2.19z"/></svg>
          Call ${m.phone}</a>`;
        if (authMode !== 'guest') {
          actionsHtml += `<a class="detail-btn sms" href="sms:+1${digits}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
            Text Message</a>`;
        }
      }
      if (m.email) {
        actionsHtml += `<a class="detail-btn email" href="mailto:${m.email}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          ${m.email}</a>`;
      }

      // Add to Contacts (vCard download) — members and admin only
      if (authMode !== 'guest') {
        const vcardParts = ['BEGIN:VCARD', 'VERSION:3.0', `FN:${m.name}`];
        if (m.phone) vcardParts.push(`TEL;TYPE=CELL:+1${m.phone.replace(/\D/g, '')}`);
        if (m.email) vcardParts.push(`EMAIL:${m.email}`);
        vcardParts.push('END:VCARD');
        const vcardUrl = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcardParts.join('\n'));
        actionsHtml += `<a class="detail-btn contact" href="${vcardUrl}" download="${m.name.replace(/\s+/g, '_')}.vcf">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Add to Contacts</a>`;
      }

      // --- Auth-conditional edit button ---
      if (authMode === 'admin') {
        // Admin: direct edit on all cards
        actionsHtml += `<button class="detail-btn edit" onclick="toggleEditForm(${idx})">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Edit Member</button>`;

        // Admin: promote/demote toggle
        const toggleLabel = m.isAdmin ? 'Remove Admin' : 'Make Admin';
        const toggleCls = m.isAdmin ? 'admin-toggle remove' : 'admin-toggle';
        actionsHtml += `<button class="detail-btn ${toggleCls}" id="admin-toggle-btn-${idx}" onclick="toggleAdmin(${idx})">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          ${toggleLabel}</button>`;
      }
      // Guest and Member: no edit button (members edit via profile on home screen)

      let editForm = '';
      if (editFormVisible && authMode === 'admin') {
        // Admin: direct edit form
        editForm = `
          <div class="edit-form">
            <div class="edit-form-title">Edit Member</div>
            <div class="edit-field">
              <label>Name</label>
              <input type="text" id="edit-name" value="${m.name}" placeholder="Full name">
            </div>
            <div class="edit-field">
              <label>Phone</label>
              <input type="tel" id="edit-phone" value="${m.phone}" placeholder="(412) 555-1234">
            </div>
            <div class="edit-field">
              <label>Email</label>
              <input type="email" id="edit-email" value="${m.email}" placeholder="email@example.com">
            </div>
            <div class="edit-field">
              <label>Member # (Duquesne ID)</label>
              <input type="number" id="edit-membernum" value="${m.memberNum}" placeholder="e.g. 9566">
            </div>
            <div class="edit-field">
              <label>Photo URL</label>
              <input type="url" id="edit-photo-url" placeholder="https://... (public image URL)">
              <div style="font-size:11px;color:#666;margin-top:4px;">Paste a publicly accessible image URL</div>
            </div>
            <button class="edit-submit" id="edit-submit-btn" onclick="adminSaveEdit(${idx})">Save Changes</button>
            <div class="edit-msg" id="edit-msg"></div>
          </div>`;
      }

      const detailAdminBadge = (authMode === 'admin' && m.isAdmin)
        ? '<span class="admin-badge">ADMIN</span>' : '';

      document.getElementById('detail').innerHTML = `
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        ${avatarHtml}
        <div class="detail-name">${name}${detailAdminBadge}</div>
        <div class="detail-actions">${actionsHtml}</div>
        ${editForm}`;
    }

    function toggleEditForm(idx) {
      editFormVisible = !editFormVisible;
      renderDetail(idx);
    }

    // Admin: direct save to Airtable
    async function adminSaveEdit(idx) {
      const m = allMembers[idx];
      const msgEl = document.getElementById('edit-msg');
      const submitBtn = document.getElementById('edit-submit-btn');

      const newName = document.getElementById('edit-name').value.trim();
      const newPhone = document.getElementById('edit-phone').value.trim();
      const newEmail = document.getElementById('edit-email').value.trim();
      const newMemberNum = document.getElementById('edit-membernum').value.trim();
      const newPhotoUrl = document.getElementById('edit-photo-url').value.trim();

      const updates = {};
      if (newName && newName !== m.name) updates['FULL NAME'] = newName;
      if (newPhone !== m.phone) updates['CELL #'] = newPhone;
      if (newEmail !== m.email) updates['E-MAIL ADDRESS'] = newEmail;
      if (newMemberNum && newMemberNum !== String(m.memberNum)) updates['MEMBER #'] = parseInt(newMemberNum);
      if (newPhotoUrl) updates['PHOTO'] = [{ url: newPhotoUrl }];

      if (Object.keys(updates).length === 0) {
        msgEl.className = 'edit-msg error';
        msgEl.textContent = 'No changes detected';
        return;
      }

      submitBtn.disabled = true;
      msgEl.className = 'edit-msg';
      msgEl.textContent = 'Saving...';

      try {
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${m.recordId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${API_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields: updates })
        });
        if (!res.ok) throw new Error(`API error ${res.status}`);

        // Update local data
        if (updates['FULL NAME']) m.name = updates['FULL NAME'];
        if ('CELL #' in updates) m.phone = updates['CELL #'];
        if ('E-MAIL ADDRESS' in updates) m.email = updates['E-MAIL ADDRESS'];
        if (updates['MEMBER #']) m.memberNum = updates['MEMBER #'];

        msgEl.className = 'edit-msg success';
        msgEl.textContent = 'Saved!';
        editFormVisible = false;
        setTimeout(() => renderDetail(idx), 1000);
        render(allMembers); // refresh cards behind overlay
      } catch (err) {
        msgEl.className = 'edit-msg error';
        msgEl.textContent = 'Failed to save. Try again.';
        submitBtn.disabled = false;
      }
    }

    // --- Export (admin only) ---
    function toggleExportPanel() {
      exportPanelOpen = !exportPanelOpen;
      const trig = document.getElementById('export-trigger');
      if (trig) trig.textContent = exportPanelOpen ? 'Close' : 'Export';
      renderExportPanel();
    }

    function renderExportPanel() {
      const host = document.getElementById('export-panel-host');
      if (!host) return;
      if (authMode !== 'admin' || !exportPanelOpen) {
        host.innerHTML = '';
        return;
      }
      const list = lastRendered;
      const emailCount = list.filter(m => m.email).length;
      const phoneCount = list.filter(m => m.phone).length;
      host.innerHTML = `
        <div class="export-panel">
          <div class="export-panel-title">Export ${list.length === allMembers.length ? 'All Members' : 'Filtered Members'}</div>
          <div class="export-count">${list.length} member${list.length !== 1 ? 's' : ''} &middot; ${emailCount} email${emailCount !== 1 ? 's' : ''} &middot; ${phoneCount} phone${phoneCount !== 1 ? 's' : ''}</div>
          <div class="export-row">
            <button class="export-action-btn email" onclick="exportEmail()">Email (BCC)</button>
            <button class="export-action-btn sms" onclick="exportSms()">Text</button>
            <button class="export-action-btn copy" onclick="exportCopyEmails()">Copy Emails</button>
            <button class="export-action-btn copy" onclick="exportCopyPhones()">Copy Phones</button>
            <button class="export-action-btn copy" onclick="exportPrintList()">Print List</button>
          </div>
          <div class="export-msg" id="export-msg"></div>
        </div>`;
    }

    function showExportMsg(text, isError) {
      const el = document.getElementById('export-msg');
      if (!el) return;
      el.className = 'export-msg' + (isError ? ' error' : '');
      el.textContent = text;
    }

    function exportEmail() {
      const emails = lastRendered.map(m => m.email).filter(Boolean);
      if (emails.length === 0) { showExportMsg('No email addresses found', true); return; }
      window.location.href = 'mailto:?bcc=' + emails.join(',');
      showExportMsg(`Opening email for ${emails.length} recipient${emails.length > 1 ? 's' : ''} (BCC)`);
    }

    function exportSms() {
      const phones = lastRendered.map(m => m.phone).filter(Boolean);
      if (phones.length === 0) { showExportMsg('No phone numbers found', true); return; }
      window.location.href = 'sms:' + phones.join(',');
      showExportMsg(`Opening messages for ${phones.length} recipient${phones.length > 1 ? 's' : ''}`);
    }

    function exportCopyEmails() {
      const emails = lastRendered.map(m => m.email).filter(Boolean);
      if (emails.length === 0) { showExportMsg('No email addresses found', true); return; }
      copyToClipboard(emails.join('; '), `${emails.length} email${emails.length > 1 ? 's' : ''} copied`);
    }

    function exportCopyPhones() {
      const phones = lastRendered.map(m => m.phone).filter(Boolean);
      if (phones.length === 0) { showExportMsg('No phone numbers found', true); return; }
      copyToClipboard(phones.join(', '), `${phones.length} phone number${phones.length > 1 ? 's' : ''} copied`);
    }

    // Open a printable list of currently-filtered members (name + member #).
    function exportPrintList() {
      if (!lastRendered || lastRendered.length === 0) { showExportMsg('List is empty', true); return; }
      const title = 'Harumphers Members';
      const subtitle = `${lastRendered.length === allMembers.length ? 'All Members' : 'Filtered Members'} — ${lastRendered.length} member${lastRendered.length !== 1 ? 's' : ''}`;
      // Normalize entries to the shape openPrintListWindow expects (name, memberNum)
      const items = lastRendered.map(m => ({ name: m.name, memberNum: m.memberNum }));
      openPrintListWindow(title, subtitle, items);
      showExportMsg('Opening print view…');
    }

    // Shared print-window builder. Items must have { name, memberNum? }.
    function openPrintListWindow(title, subtitle, list) {
      const esc = (s) => String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      const rows = list.map((e, i) => `
        <tr>
          <td class="idx">${i + 1}.</td>
          <td class="nm">${esc(e.name)}</td>
          <td class="mn">${esc(e.memberNum != null && e.memberNum !== '' ? e.memberNum : '')}</td>
        </tr>`).join('');
      const html = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>${esc(title)} — Print List</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #111; margin: 24px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #555; font-size: 13px; margin-bottom: 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: top; }
  th { background: #f3f3f3; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #555; }
  td.idx { width: 36px; color: #888; }
  td.mn  { width: 110px; font-variant-numeric: tabular-nums; color: #333; }
  td.nm  { font-weight: 500; }
  .actions { margin-top: 18px; }
  button { font: inherit; padding: 6px 12px; cursor: pointer; }
  @media print {
    .actions { display: none; }
    body { margin: 12mm; }
  }
</style></head>
<body>
  <h1>${esc(title)}</h1>
  <div class="sub">${esc(subtitle)}</div>
  <table>
    <thead><tr><th>#</th><th>Name</th><th>Member #</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="actions">
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
  </div>
  <scr`+`ipt>setTimeout(() => window.print(), 250);</scr`+`ipt>
</body></html>`;
      const w = window.open('', '_blank');
      if (!w) {
        alert('Print window was blocked by your browser. Please allow pop-ups for this site.');
        return;
      }
      w.document.open();
      w.document.write(html);
      w.document.close();
    }

    function copyToClipboard(text, successMsg) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => showExportMsg(successMsg)).catch(() => fallbackCopy(text, successMsg));
      } else {
        fallbackCopy(text, successMsg);
      }
    }

    function fallbackCopy(text, successMsg) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '0'; ta.style.top = '0'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (e) { /* ignore */ }
      document.body.removeChild(ta);
      if (ok) { showExportMsg(successMsg); }
      else { showCopyableText(text); }
    }

    function showCopyableText(text) {
      const el = document.getElementById('export-msg');
      if (!el) return;
      el.innerHTML = `<div style="margin-top:6px">
        <div style="color:#ff6b6b;margin-bottom:6px">Tap the box below, Select All, then Copy:</div>
        <textarea readonly style="width:100%;min-height:48px;padding:8px;border-radius:6px;border:1px solid #666;background:#2a2a2a;color:#fff;font-size:13px;font-family:inherit;-webkit-user-select:text;user-select:text">${text.replace(/</g, '&lt;')}</textarea>
      </div>`;
      const newTa = el.querySelector('textarea');
      if (newTa) newTa.addEventListener('focus', () => { newTa.select(); newTa.setSelectionRange(0, newTa.value.length); });
    }

    // Show the Export trigger for admins
    if (authMode === 'admin') {
      const bar = document.getElementById('admin-bar');
      if (bar) bar.style.display = '';
    }

    async function toggleAdmin(idx) {
      const m = allMembers[idx];
      const btn = document.getElementById(`admin-toggle-btn-${idx}`);
      const next = !m.isAdmin;
      if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
      try {
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${m.recordId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${API_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ fields: { 'IS ADMIN': next } })
        });
        if (!res.ok) throw new Error(`API error ${res.status}`);
        m.isAdmin = next;
        renderDetail(idx);
        render(allMembers);
      } catch (err) {
        if (btn) {
          btn.disabled = false;
          btn.style.opacity = '1';
          btn.textContent = 'Failed — tap to retry';
        }
      }
    }

    function closeDetail() {
      editFormVisible = false;
      document.getElementById('overlay').classList.remove('open');
    }

    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDetail();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    applyApprovedChanges().then(() => loadDirectory()).catch(err => {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <p>Could not load directory</p>
          <p style="font-size:13px;color:#888;margin-top:8px;">${err.message}</p>
          <a href="https://airtable.com/appW7Df1qJlznxxtf/shrMlfdxvWotFV2lG">Open in Airtable instead &rarr;</a>
        </div>`;
      document.getElementById('count').textContent = '';
    });
  </script>
</body>
</html>
