      openPrintListWindow(ev.name || 'Event', subtitle, list);
      showExportMsg(eventIdx, 'Opening print view…');
    }

    // Shared print-window builder. `list` items must have {name, memberNum?}.
    function openPrintListWindow(title, subtitle, list) {
      const esc = (s) => String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      const rows = list.map((e, i) => {
        const num = e.memberNum != null && e.memberNum !== '' ? e.memberNum : '';
        const guest = e.guestCount && e.guestCount > 0 ? ` <span class="g">(+${e.guestCount} guest${e.guestCount>1?'s':''})</span>` : '';
        return `<tr>
          <td class="idx">${i + 1}.</td>
          <td class="nm">${esc(e.name)}${guest}</td>
          <td class="mn">${esc(num)}</td>
        </tr>`;
      }).join('');
      const html = `<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>${esc(title)} — Print List</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #111; margin: 24px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .sub { color: #555; font-size: 13px; margin-bottom: 18px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #ddd; vertical-align: top; }
  th { background: #f3f3f3; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #555; }
  td.idx { width: 36px; color: #888; }
  td.mn  { width: 110px; font-variant-numeric: tabular-nums; color: #333; }
  td.nm  { font-weight: 500; }
  .g { font-weight: 400; color: #666; font-size: 12px; }
  .actions { margin-top: 18px; }
  button { font: inherit; padding: 6px 12px; cursor: pointer; }
  @media print {
    .actions { display: none; }
    body { margin: 12mm; }
  }
</style></head>
<body>
  <h1>${esc(title)}</h1>
  <div class="sub">${esc(subtitle)}</div>
  <table>
    <thead><tr><th>#</th><th>Name</th><th>Member #</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div class="actions">
    <button onclick="window.print()">Print</button>
    <button onclick="window.close()">Close</button>
  </div>
  <scr`+`ipt>setTimeout(() => window.print(), 250);</scr`+`ipt>
</body></html>`;
      const w = window.open('', '_blank');
      if (!w) {
        alert('Print window was blocked by your browser. Please allow pop-ups for this site.');
        return;
      }
      w.document.open();
      w.document.write(html);
      w.document.close();
    }

    async function submitGalleryPhoto(eventIdx, fileInput) {
      const ev = allEvents[eventIdx];
      if (!ev.eventRecordId || !fileInput.files.length) return;
      const file = fileInput.files[0];
      const caption = (document.getElementById(`gallery-caption-${eventIdx}`) || {}).value || '';
      const msgEl = document.getElementById(`gallery-msg-${eventIdx}`);
      const memberName = myInfo ? myInfo.name : 'Guest';

      if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Uploading photo...'; }

      try {
        // Upload to temp host
        const publicUrl = await uploadPhotoFile(file);

        // Create record in EVENT PHOTOS table
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${PHOTOS_TABLE}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: {
              'EVENT RECORD ID': ev.eventRecordId,
              'EVENT NAME': ev.name,
              'MEMBER NAME': memberName,
              'PHOTO': [{ url: publicUrl }],
              'CAPTION': caption,
              'SUBMITTED': new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' }),
            }
          })
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
        }

        // Add to local gallery data
        const data = await res.json();
        if (!galleryPhotos[ev.eventRecordId]) galleryPhotos[ev.eventRecordId] = [];
        const newPhotos = data.fields['PHOTO'] || [];
        newPhotos.forEach(p => {
          galleryPhotos[ev.eventRecordId].push({
            recordId: data.id,
            url: p.url,
            thumb: (p.thumbnails && p.thumbnails.large) ? p.thumbnails.large.url : p.url,
            memberName,
            caption,
          });
        });

        if (msgEl) { msgEl.style.color = '#4CAF50'; msgEl.textContent = 'Photo added!'; }
        fileInput.value = '';
        const captionInput = document.getElementById(`gallery-caption-${eventIdx}`);
        if (captionInput) captionInput.value = '';
        render();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Upload failed: ' + err.message; }
      }
    }

    async function removeGalleryPhoto(eventRecordId, photoRecordId) {
      try {
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${PHOTOS_TABLE}/${photoRecordId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${API_TOKEN}` },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        // Remove from local data
        if (galleryPhotos[eventRecordId]) {
          galleryPhotos[eventRecordId] = galleryPhotos[eventRecordId].filter(p => p.recordId !== photoRecordId);
        }
        render();
      } catch (err) {
        alert('Delete failed: ' + err.message);
      }
    }

    function editGalleryCaption(photoRecordId, currentCaption) {
      const newCaption = prompt('Edit caption:', currentCaption);
      if (newCaption === null) return; // cancelled
      saveGalleryCaption(photoRecordId, newCaption);

    async function saveGalleryCaption(photoRecordId, caption) {
      try {
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${PHOTOS_TABLE}/${photoRecordId}`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ fields: { 'CAPTION': caption } })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        // Update local data
        for (const eventId in galleryPhotos) {
          const photo = galleryPhotos[eventId].find(p => p.recordId === photoRecordId);
          if (photo) { photo.caption = caption; break; }
        }
        render();
      } catch (err) {
        alert('Caption update failed: ' + err.message);

    }

    async function uploadPhotoFile(file) {
      // Upload to tmpfiles.org (free, no API key, 1 hour expiry — enough for Airtable to download)
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('https://tmpfiles.org/api/v1/upload', {
        method: 'POST',
        body: formData,
      });
      if (!res.ok) throw new Error('Photo upload failed');
      const data = await res.json();
      // tmpfiles.org returns URL like https://tmpfiles.org/12345/image.jpg
      // Direct download URL is https://tmpfiles.org/dl/12345/image.jpg
      const url = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
      return url;
    }

    async function saveEventDetails(eventIdx) {
      const ev = allEvents[eventIdx];
      const name = document.getElementById(`edit-name-${eventIdx}`).value.trim();
      const speaker = document.getElementById(`edit-speaker-${eventIdx}`).value.trim();
      const date = document.getElementById(`edit-date-${eventIdx}`).value.trim();
      const time = document.getElementById(`edit-time-${eventIdx}`).value.trim();
      const room = document.getElementById(`edit-room-${eventIdx}`).value.trim();
      const notes = document.getElementById(`edit-notes-${eventIdx}`).value.trim();
      const photoUrl = document.getElementById(`edit-photo-url-${eventIdx}`).value.trim();
      const status = document.getElementById(`edit-status-${eventIdx}`).value;
      const msgEl = document.getElementById(`edit-msg-${eventIdx}`);
      const saveBtn = document.getElementById(`edit-save-${eventIdx}`);

      if (!name) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Name is required'; }
        return;
      }

      if (status.toLowerCase() === 'scheduled' && !date) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Date is required for Scheduled events'; }
        if (saveBtn) saveBtn.disabled = false;
        return;
      }

      if (saveBtn) saveBtn.disabled = true;
      if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Saving...'; }

      try {
        // If promoting Suggested/Upcoming → Scheduled and no RSVP column exists yet,
        // auto-create the RSVP + GUESTS columns. Without this, the events page
        // would show "RSVP not yet configured" because no Members-table column
        // would ever match this event.
        const ns = normalizeStatus(status).toLowerCase();
        let createdColumns = false;
        if (ns === 'scheduled' && !ev.fieldName && date && name) {
          const dt = new Date(date + 'T12:00:00');
          const mon = dt.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
          const day = dt.getDate();
          const newRsvpFieldName = `${mon}${day}-${name.toUpperCase()} RSVP`;

          if (msgEl) msgEl.textContent = 'Creating RSVP field...';
          const fieldRes = await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: newRsvpFieldName,
              type: 'singleSelect',
              options: { choices: [
                { name: 'YES', color: 'greenLight2' },
                { name: 'NO', color: 'redLight2' },
                { name: 'MAYBE', color: 'yellowLight2' }
              ]}
            })
          });
          if (!fieldRes.ok) {
            const errData = await fieldRes.json().catch(() => ({}));
            if (fieldRes.status === 403 || fieldRes.status === 422) {
              throw new Error('Cannot create RSVP field. Token needs schema.bases:write scope.');
            }
            throw new Error((errData.error && errData.error.message) || `RSVP field creation failed (${fieldRes.status})`);
          }

          if (msgEl) msgEl.textContent = 'Creating guest count field...';
          const nameWords = name.toUpperCase().split(/\s+/);
          const guestKey = nameWords[0].length > 2 ? nameWords[0] : nameWords.slice(0, 2).join('');
          const guestFieldName = `GUESTS-${guestKey}`;
          await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: guestFieldName, type: 'number', options: { precision: 0 } })
          });

          ev.fieldName = newRsvpFieldName;
          ev.guestFieldName = guestFieldName;
          createdColumns = true;
        }

        const fields = {
          'EVENT NAME': name,
          'Status': status || null,
          'NOTES': notes || null,
          'DATE': date || null,
          'SPEAKER': speaker || null,
          'TIME': time || null,
          'ROOM': room || null,
        };

        // Handle photo: file upload takes precedence over URL
        let finalPhotoUrl = photoUrl;
        if (pendingPhotoFiles[eventIdx]) {
          if (msgEl) msgEl.textContent = 'Uploading photo...';
          finalPhotoUrl = await uploadPhotoFile(pendingPhotoFiles[eventIdx]);
          delete pendingPhotoFiles[eventIdx];
        }
        if (finalPhotoUrl) {
          fields['SPEAKER PHOTO'] = [{ url: finalPhotoUrl }];
        }

        if (ev.eventRecordId) {
          // Update existing EVENTS record
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}/${ev.eventRecordId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ typecast: true, fields })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg = errData.error ? errData.error.message : `HTTP ${res.status}`;
            throw new Error(errMsg);
          }
        } else {
          // Create new EVENTS record for this RSVP field
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ typecast: true, fields })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg = errData.error ? errData.error.message : `HTTP ${res.status}`;
            throw new Error(errMsg);
          }
          const data = await res.json();
          ev.eventRecordId = data.id;
        }

        // If new RSVP/GUESTS columns were created, do a full reload so the
        // members data and bucket fills include the new columns.
        if (createdColumns) {
          if (msgEl) { msgEl.style.color = '#4CAF50'; msgEl.textContent = 'Saved! Reloading...'; }
          editingEvent = null;
          await loadEvents();
          return;
        }

        // Update local state (no reload needed)
        ev.name = name;
        ev.speaker = speaker;
        ev.date = date;
        ev.time = time;
        ev.room = room;
        ev.notes = notes;
        ev.isCompleted = ns === 'completed';
        ev.isSuggested = ns === 'suggested';
        ev.isUpcoming = ns === 'upcoming' || ns === '';
        ev.isScheduled = ns === 'scheduled';
        ev.isCancelled = ns === 'cancelled';
        ev.status = normalizeStatus(status);
        if (finalPhotoUrl) ev.speakerPhoto = finalPhotoUrl;
        editingEvent = null;
        render();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Save failed: ' + err.message; }
        if (saveBtn) saveBtn.disabled = false;
      }
    }

    // --- New Event Creation ---
    function toggleNewEvent() {
      showingNewEvent = !showingNewEvent;
      render();
    }

    async function createNewEvent() {
      const name = document.getElementById('new-event-name').value.trim();
      const date = document.getElementById('new-event-date').value;
      const status = document.getElementById('new-event-status').value;
      const prefix = document.getElementById('new-event-prefix').value.trim();
      const speaker = document.getElementById('new-event-speaker').value.trim();
      const time = document.getElementById('new-event-time').value.trim();
      const room = document.getElementById('new-event-room').value.trim();
      const notes = document.getElementById('new-event-notes').value.trim();
      const photoInput = document.getElementById('new-event-photo');
      const enableGuests = document.getElementById('new-event-guests').checked;
      const msgEl = document.getElementById('new-event-msg');
      const createBtn = document.getElementById('new-event-create-btn');

      if (!name) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Please fill in the event name'; }
        return;
      }
      if (status === 'Scheduled' && !date) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Date is required for Scheduled events'; }
        return;
      }

      // Validate prefix ends with RSVP (only needed for Scheduled events)
      const rsvpFieldName = prefix ? (prefix.toUpperCase().endsWith('RSVP') ? prefix.toUpperCase() : prefix.toUpperCase() + ' RSVP') : null;

      if (status === 'Scheduled' && !prefix) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'RSVP Field is required for Scheduled events'; }
        return;
      }

      if (createBtn) createBtn.disabled = true;

      try {
        // Step 1: Create singleSelect RSVP field on Members table (Scheduled only)
        if (status === 'Scheduled') {
          if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Creating RSVP field...'; }
          const fieldRes = await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: rsvpFieldName,
              type: 'singleSelect',
              options: {
                choices: [
                  { name: 'YES', color: 'greenLight2' },
                  { name: 'NO', color: 'redLight2' },
                  { name: 'MAYBE', color: 'yellowLight2' }
                ]
              }
            })
          });

          if (!fieldRes.ok) {
            const errData = await fieldRes.json().catch(() => ({}));
            if (fieldRes.status === 403 || fieldRes.status === 422) {
              throw new Error('Token needs schema.bases:write scope. Update token at airtable.com/create/tokens');
            }
            throw new Error(errData.error?.message || `Field creation failed (${fieldRes.status})`);
          }

          // Step 2: Optionally create guest count field
          if (enableGuests) {
            if (msgEl) msgEl.textContent = 'Creating guest field...';
            const nameWords = name.toUpperCase().split(/\s+/);
            const guestKey = nameWords[0].length > 2 ? nameWords[0] : nameWords.slice(0, 2).join('');
            const guestFieldName = `GUESTS-${guestKey}`;

            await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: guestFieldName, type: 'number', options: { precision: 0 } })
            });
          }
        }

        // Step 3: Handle speaker photo upload if provided
        let photoUrl = null;
        if (photoInput && photoInput.files && photoInput.files[0]) {
          if (msgEl) msgEl.textContent = 'Uploading speaker photo...';
          photoUrl = await uploadPhotoFile(photoInput.files[0]);
        }

        // Step 4: Create EVENTS table record with all fields
        if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Creating event record...'; }
        const eventFields = { 'EVENT NAME': name, 'Status': status };
        if (date) eventFields['DATE'] = date;
        if (speaker) eventFields['SPEAKER'] = speaker;
        if (time) eventFields['TIME'] = time;
        if (room) eventFields['ROOM'] = room;
        if (notes) eventFields['NOTES'] = notes;
        if (photoUrl) eventFields['SPEAKER PHOTO'] = [{ url: photoUrl }];
        await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ typecast: true, fields: eventFields })
        });

        // Reload everything
        if (msgEl) { msgEl.style.color = '#4CAF50'; msgEl.textContent = 'Event created! Reloading...'; }
        showingNewEvent = false;
        await loadEvents();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = err.message; }
        if (createBtn) createBtn.disabled = false;
      }
    }

    function showExportMsg(eventIdx, msg, isError) {
      const el = document.getElementById(`export-msg-${eventIdx}`);
      if (el) {
        el.style.color = isError ? '#ff6b6b' : '#4CAF50';
        el.textContent = msg;
        if (!isError) setTimeout(() => { if (el) el.textContent = ''; }, 3000);
      }
    }

    // --- Attendance ---
    function buildAttendanceSection(ev, eventIdx) {
      if (!ev.isCompleted) return '';
      if (!ev.eventRecordId) return '';

      const evAttendance = attendanceData[ev.eventRecordId] || {};
      const hasAttendance = Object.keys(evAttendance).length > 0;

      // Admin: show checklist button/panel
      if (authMode === 'admin' && showingAttendance === eventIdx) {
        // Build checklist rows sorted by RSVP status
        const allEntries = [...ev.yes.map(e => ({...e, rsvp: 'YES'})),
                           ...ev.maybe.map(e => ({...e, rsvp: 'MAYBE'})),
                           ...ev.no.map(e => ({...e, rsvp: 'NO'})),
                           ...ev.pending.map(e => ({...e, rsvp: null}))];

        const rows = allEntries.map((entry, ri) => {
          const att = evAttendance[entry.recordId];
          const checked = att ? att.attended : false;
          const guests = att ? att.actualGuests : 0;
          const rsvpCls = entry.rsvp === 'YES' ? 'yes' : entry.rsvp === 'NO' ? 'no' : entry.rsvp === 'MAYBE' ? 'maybe' : 'pending';
          const rsvpLabel = entry.rsvp || 'No RSVP';
          return `<div class="attendance-row">
            <label>
              <input type="checkbox" id="att-chk-${eventIdx}-${ri}" ${checked ? 'checked' : ''}>
              <span>${entry.name}</span>
            </label>
            <span class="attendance-rsvp-pill ${rsvpCls}">${rsvpLabel}</span>
            <input type="number" class="attendance-guest-input" id="att-guests-${eventIdx}-${ri}"
              value="${guests}" min="0" max="20" placeholder="0" title="Guests">
          </div>`;
        }).join('');

        return `
          <div class="attendance-panel" onclick="event.stopPropagation()">
            <div class="attendance-panel-title">Record Attendance</div>
            ${rows}
            <button class="attendance-save-btn" id="att-save-btn-${eventIdx}" onclick="saveAttendance(${eventIdx})">Save Attendance</button>
            <button class="attendance-btn" style="border-color:#888;color:#888;margin:8px 0 0;width:100%" onclick="toggleAttendance(${eventIdx})">Cancel</button>
            <div class="attendance-msg" id="att-msg-${eventIdx}"></div>
          </div>`;
      }

      // Admin: show button to open checklist + summary if data exists
      if (authMode === 'admin') {
        const btnLabel = hasAttendance ? 'Edit Attendance' : 'Record Attendance';
        let adminHtml = `<button class="attendance-btn" onclick="event.stopPropagation(); toggleAttendance(${eventIdx})">${btnLabel}</button>`;
        if (hasAttendance) {
          adminHtml += buildAttendanceSummary(ev, evAttendance);
        }
        return adminHtml;
      }

      // Non-admin: show attendance summary if data exists
      if (!hasAttendance) return '';
      return buildAttendanceSummary(ev, evAttendance);
    }

    function buildAttendanceSummary(ev, evAttendance) {
      const allEntries = [...ev.yes, ...ev.maybe, ...ev.no, ...ev.pending];
      const attended = [];
      const noShows = []; // RSVP'd YES but didn't attend
      const walkIns = []; // No RSVP (or NO/MAYBE) but attended

      allEntries.forEach(entry => {
        const att = evAttendance[entry.recordId];
        if (!att) return;
        const rsvpYes = ev.yes.some(e => e.recordId === entry.recordId);
        if (att.attended) {
          const guestLabel = att.actualGuests > 0 ? ` (+${att.actualGuests})` : '';
          if (!rsvpYes) {
            walkIns.push({ name: entry.name, guestLabel });
          } else {
            attended.push({ name: entry.name, guestLabel });
          }
        } else if (rsvpYes) {
          noShows.push({ name: entry.name });
        }
      });

      // Also include attended members who RSVP'd yes (they're just "attended")
      const totalAttended = attended.length + walkIns.length;
      const totalGuests = Object.values(evAttendance)
        .filter(a => a.attended)
        .reduce((sum, a) => sum + (a.actualGuests || 0), 0);

      if (totalAttended === 0 && noShows.length === 0) return '';

      let html = `<div class="attendance-summary">
        <div class="attendance-summary-title">Attendance</div>
        <div class="attendance-summary-stats">${totalAttended} attended${totalGuests > 0 ? ` + ${totalGuests} guest${totalGuests !== 1 ? 's' : ''}` : ''}${noShows.length > 0 ? ` &middot; ${noShows.length} no-show${noShows.length !== 1 ? 's' : ''}` : ''}</div>`;

      if (attended.length > 0) {
        html += `<div style="margin-bottom:4px">${attended.map(a =>
          `<span class="attendance-chip attended">${a.name}${a.guestLabel}</span>`).join('')}</div>`;
      }
      if (walkIns.length > 0) {
        html += `<div style="margin-bottom:4px"><span style="font-size:11px;color:#6495ED;font-weight:600">WALK-INS</span> ${walkIns.map(a =>
          `<span class="attendance-chip walk-in">${a.name}${a.guestLabel}</span>`).join('')}</div>`;
      }
      if (noShows.length > 0) {
        html += `<div><span style="font-size:11px;color:#ff8a8a;font-weight:600">NO-SHOWS</span> ${noShows.map(a =>
          `<span class="attendance-chip no-show">${a.name}</span>`).join('')}</div>`;
      }

      html += '</div>';
      return html;
    }

    function toggleAttendance(eventIdx) {
      showingAttendance = showingAttendance === eventIdx ? null : eventIdx;
      render();
    }

    async function saveAttendance(eventIdx) {
      const ev = allEvents[eventIdx];
      if (!ev || !ev.eventRecordId) return;

      const msgEl = document.getElementById(`att-msg-${eventIdx}`);
      const saveBtn = document.getElementById(`att-save-btn-${eventIdx}`);
      if (saveBtn) saveBtn.disabled = true;
      if (msgEl) { msgEl.className = 'attendance-msg'; msgEl.textContent = 'Saving...'; }

      const allEntries = [...ev.yes.map(e => ({...e, rsvp: 'YES'})),
                         ...ev.maybe.map(e => ({...e, rsvp: 'MAYBE'})),
                         ...ev.no.map(e => ({...e, rsvp: 'NO'})),
                         ...ev.pending.map(e => ({...e, rsvp: null}))];

      const evAttendance = attendanceData[ev.eventRecordId] || {};

      // Collect records to create and update
      const toCreate = [];
      const toUpdate = [];

      allEntries.forEach((entry, ri) => {
        const chk = document.getElementById(`att-chk-${eventIdx}-${ri}`);
        const gInput = document.getElementById(`att-guests-${eventIdx}-${ri}`);
        const attended = chk ? chk.checked : false;
        const actualGuests = gInput ? parseInt(gInput.value) || 0 : 0;
        const existing = evAttendance[entry.recordId];

        if (existing) {
          // Update if changed
          if (existing.attended !== attended || existing.actualGuests !== actualGuests) {
            toUpdate.push({
              id: existing.recordId,
              fields: { 'ATTENDED': attended, 'ACTUAL GUESTS': actualGuests }
            });
          }
        } else {
          // Only create if attended or has guests (skip empty rows)
          if (attended || actualGuests > 0) {
            toCreate.push({
              fields: {
                'MEMBER RECORD ID': entry.recordId,
                'MEMBER NAME': entry.name,
                'EVENT RECORD ID': ev.eventRecordId,
                'ATTENDED': attended,
                'ACTUAL GUESTS': actualGuests,
              }
            });
          }
        }
      });

      try {
        // Batch creates (Airtable max 10 per request)
        for (let j = 0; j < toCreate.length; j += 10) {
          const batch = toCreate.slice(j, j + 10);
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${ATTENDANCE_TABLE}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ records: batch })
          });
          if (!res.ok) throw new Error(`Create failed: ${res.status}`);
          // Update local cache with new record IDs
          const data = await res.json();
          data.records.forEach(r => {
            const f = r.fields;
            const memberId = f['MEMBER RECORD ID'];
            if (!attendanceData[ev.eventRecordId]) attendanceData[ev.eventRecordId] = {};
            attendanceData[ev.eventRecordId][memberId] = {
              attended: !!f['ATTENDED'],
              actualGuests: f['ACTUAL GUESTS'] || 0,
              recordId: r.id,
            };
          });
        }

        // Batch updates (Airtable max 10 per request)
        for (let j = 0; j < toUpdate.length; j += 10) {
          const batch = toUpdate.slice(j, j + 10);
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${ATTENDANCE_TABLE}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ records: batch })
          });
          if (!res.ok) throw new Error(`Update failed: ${res.status}`);
          // Update local cache
          const data = await res.json();
          data.records.forEach(r => {
            const f = r.fields;
            const memberId = f['MEMBER RECORD ID'];
            if (attendanceData[ev.eventRecordId] && attendanceData[ev.eventRecordId][memberId]) {
              attendanceData[ev.eventRecordId][memberId].attended = !!f['ATTENDED'];
              attendanceData[ev.eventRecordId][memberId].actualGuests = f['ACTUAL GUESTS'] || 0;
            }
          });
        }

        if (msgEl) { msgEl.className = 'attendance-msg success'; msgEl.textContent = 'Attendance saved!'; }
        showingAttendance = null;
        setTimeout(() => render(), 1000);
      } catch (err) {
        if (msgEl) { msgEl.className = 'attendance-msg error'; msgEl.textContent = 'Failed: ' + err.message; }
        if (saveBtn) saveBtn.disabled = false;
      }
    }

    // Build the inline edit panel for a single member's vote on a suggested event.
    // Reuses .vote-* classes for visual consistency with the main vote-section.
    function buildInlineVoteEditPanel(eventIdx, memberId, currentVote) {
      const upActive = currentVote === 'UP' ? ' active' : '';
      const downActive = currentVote === 'DOWN' ? ' active' : '';
      return `<div class="inline-edit" onclick="event.stopPropagation()" style="margin-top:6px">
        <div class="vote-buttons">
          <button class="vote-btn up-btn${upActive}" onclick="submitInlineVote(${eventIdx}, '${memberId}', 'UP')">Interested</button>
          <button class="vote-btn down-btn${downActive}" onclick="submitInlineVote(${eventIdx}, '${memberId}', 'DOWN')">Not Interested</button>
          <button class="vote-btn clear-btn" onclick="submitInlineVote(${eventIdx}, '${memberId}', null)">Clear</button>
        </div>
        <div class="vote-msg" id="inline-vote-msg-${eventIdx}-${memberId}"></div>
      </div>`;
    }

    function buildVotingSection(ev, eventIdx) {
      if (!ev.isSuggested) return '';
      if (!ev.eventRecordId) return '';

      const evVotes = votesData[ev.eventRecordId] || {};
      let upCount = 0, downCount = 0;
      const upVoters = [], downVoters = [];

      for (const memberId in evVotes) {
        const v = evVotes[memberId];
        const member = allMembers.find(m => m.id === memberId);
        if (!member) continue;
        const name = member.fields['FULL NAME'] || 'Unknown';
        if (v.vote === 'UP') {
          upCount++;
          upVoters.push({ memberId, name });
        } else if (v.vote === 'DOWN') {
          downCount++;
          downVoters.push({ memberId, name });
        }
      }

      const noResponse = allMembers.length - upCount - downCount;
      const tallyHtml = `<div class="vote-tally">${upCount} interested / ${downCount} not interested / ${noResponse} no response</div>`;

      // Guest: tally only
      if (authMode === 'guest') {
        return `<div class="vote-section" onclick="event.stopPropagation()">
          <div class="vote-section-title">Member Interest</div>
          ${tallyHtml}
        </div>`;
      }

      // Member/Admin: vote buttons
      const myVote = myInfo && evVotes[myInfo.recordId] ? evVotes[myInfo.recordId].vote : null;
      const upActive = myVote === 'UP' ? ' active' : '';
      const downActive = myVote === 'DOWN' ? ' active' : '';
      const clearBtn = myVote ? `<button class="vote-btn clear-btn" id="vote-clear-${eventIdx}" onclick="submitVote(${eventIdx}, null)">Clear</button>` : '';

      // Admin: clickable chips → inline edit panel + dropdown for non-voters
      let voterLists = '';
      if (authMode === 'admin') {
        const renderChips = (voters, cls, label) => {
          if (voters.length === 0) return '';
          return `<div style="margin-top:8px"><span style="font-size:11px;color:${cls === 'up' ? '#81C784' : '#ff8a8a'};font-weight:600">${label}</span> ` +
            voters.map(v => {
              const isEditing = inlineVoteEdit && inlineVoteEdit.eventIdx === eventIdx && inlineVoteEdit.memberId === v.memberId;
              const chip = `<span class="vote-chip ${cls}" style="cursor:pointer" onclick="event.stopPropagation(); openInlineVoteEdit(${eventIdx}, '${v.memberId}')" title="Click to edit ${v.name}'s vote">${v.name}</span>`;
              return chip + (isEditing ? buildInlineVoteEditPanel(eventIdx, v.memberId, cls === 'up' ? 'UP' : 'DOWN') : '');
            }).join('') +
            `</div>`;
        };
        voterLists += renderChips(upVoters, 'up', 'INTERESTED');
        voterLists += renderChips(downVoters, 'down', 'NOT INTERESTED');

        // "Cast vote for non-voter" — surfaced when admin opens edit on a non-voter
        const nonVoterEditing = inlineVoteEdit
          && inlineVoteEdit.eventIdx === eventIdx
          && !evVotes[inlineVoteEdit.memberId];
        const nonVoterPanel = nonVoterEditing
          ? `<div style="margin-top:6px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px">
               <div style="font-size:12px;color:#aaa;margin-bottom:4px">${(allMembers.find(m => m.id === inlineVoteEdit.memberId) || {}).fields?.['FULL NAME'] || 'Member'}</div>
               ${buildInlineVoteEditPanel(eventIdx, inlineVoteEdit.memberId, null)}
             </div>`
          : '';
        const nonVoterOptions = allMembers
          .filter(m => !evVotes[m.id])
          .map(m => `<option value="${m.id}">${m.fields['FULL NAME'] || 'Unknown'}</option>`)
          .join('');
        if (nonVoterOptions) {
          voterLists += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08)">
            <div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px">CAST VOTE ON BEHALF OF</div>
            <select id="vote-add-select-${eventIdx}" style="background:#222;color:#eee;border:1px solid #444;border-radius:6px;padding:6px 8px;font-size:13px;width:100%;max-width:260px"
              onchange="if(this.value) openInlineVoteEdit(${eventIdx}, this.value)">
              <option value="">Select member…</option>
              ${nonVoterOptions}
            </select>
            ${nonVoterPanel}
          </div>`;
        }
      }

      return `<div class="vote-section" onclick="event.stopPropagation()">
        <div class="vote-section-title">Member Interest</div>
        <div class="vote-buttons">
          <button class="vote-btn up-btn${upActive}" id="vote-up-${eventIdx}" onclick="submitVote(${eventIdx}, 'UP')">Interested</button>
          <button class="vote-btn down-btn${downActive}" id="vote-down-${eventIdx}" onclick="submitVote(${eventIdx}, 'DOWN')">Not Interested</button>
          ${clearBtn}
        </div>
        ${tallyHtml}
        ${voterLists}
        <div class="vote-msg" id="vote-msg-${eventIdx}"></div>
      </div>`;
    }

    // Toggle inline vote edit panel for a specific member on a specific event.
    function openInlineVoteEdit(eventIdx, memberId) {
      if (inlineVoteEdit && inlineVoteEdit.eventIdx === eventIdx && inlineVoteEdit.memberId === memberId) {
        inlineVoteEdit = null;
      } else {
        inlineVoteEdit = { eventIdx, memberId };
      }
      render();
    }

    async function submitVote(eventIdx, value) {
      if (votingInFlight.has(eventIdx)) return;
      if (!myInfo) return;

      votingInFlight.add(eventIdx);

      const ev = allEvents[eventIdx];
      if (!ev || !ev.eventRecordId) {
        votingInFlight.delete(eventIdx);
        return;
      }

      // Disable vote buttons
      const upBtn = document.getElementById(`vote-up-${eventIdx}`);
      const downBtn = document.getElementById(`vote-down-${eventIdx}`);
      const clearBtn = document.getElementById(`vote-clear-${eventIdx}`);
      [upBtn, downBtn, clearBtn].forEach(b => { if (b) b.disabled = true; });

      const msgEl = document.getElementById(`vote-msg-${eventIdx}`);
      if (msgEl) { msgEl.className = 'vote-msg'; msgEl.textContent = 'Submitting...'; }

      try {
        const evVotes = votesData[ev.eventRecordId] || {};
        const existing = evVotes[myInfo.recordId];

        if (value === null) {
          // DELETE existing vote
          if (existing && existing.recordId) {
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}/${existing.recordId}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${API_TOKEN}` },
            });
            if (!res.ok) throw new Error(`Delete failed: HTTP ${res.status}`);
          }
          // Remove from local cache
          if (votesData[ev.eventRecordId]) {
            delete votesData[ev.eventRecordId][myInfo.recordId];
          }
        } else if (existing && existing.recordId) {
          // PATCH existing vote record
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}/${existing.recordId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { 'VOTE': value } })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
          }
          // Update local cache
          if (!votesData[ev.eventRecordId]) votesData[ev.eventRecordId] = {};
          votesData[ev.eventRecordId][myInfo.recordId] = { vote: value, recordId: existing.recordId };
        } else {
          // No local record — query Airtable for deduplication
          const formula = encodeURIComponent(`AND({MEMBER RECORD ID}="${myInfo.recordId}",{EVENT RECORD ID}="${ev.eventRecordId}")`);
          const checkRes = await apiFetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}?filterByFormula=${formula}`);
          if (checkRes.records && checkRes.records.length > 0) {
            // Found existing — PATCH
            const existingId = checkRes.records[0].id;
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}/${existingId}`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ fields: { 'VOTE': value } })
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
            }
            if (!votesData[ev.eventRecordId]) votesData[ev.eventRecordId] = {};
            votesData[ev.eventRecordId][myInfo.recordId] = { vote: value, recordId: existingId };
          } else {
            // No existing record — POST new
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                fields: {
                  'MEMBER RECORD ID': myInfo.recordId,
                  'MEMBER NAME': myInfo.name || '',
                  'EVENT RECORD ID': ev.eventRecordId,
                  'VOTE': value,
                }
              })
            });
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
            }
            const data = await res.json();
            if (!votesData[ev.eventRecordId]) votesData[ev.eventRecordId] = {};
            votesData[ev.eventRecordId][myInfo.recordId] = { vote: value, recordId: data.id };
          }
        }

        // Show success
        render();
        const newMsg = document.getElementById(`vote-msg-${eventIdx}`);
        if (newMsg) {
          newMsg.className = 'vote-msg success';
          newMsg.textContent = value === null ? 'Vote cleared' : (value === 'UP' ? 'Marked as interested' : 'Marked as not interested');
          setTimeout(() => { if (newMsg) newMsg.textContent = ''; }, 3000);
        }
      } catch (err) {
        if (msgEl) {
          msgEl.className = 'vote-msg error';
          msgEl.textContent = 'Failed: ' + err.message;
        }
      } finally {
        votingInFlight.delete(eventIdx);
        // Re-enable buttons
        const upBtn2 = document.getElementById(`vote-up-${eventIdx}`);
        const downBtn2 = document.getElementById(`vote-down-${eventIdx}`);
        const clearBtn2 = document.getElementById(`vote-clear-${eventIdx}`);
        [upBtn2, downBtn2, clearBtn2].forEach(b => { if (b) b.disabled = false; });
      }
    }

    // Admin: set or clear a vote for any member on a Suggested event.
    // Mirrors submitVote() but operates on an arbitrary memberId (not myInfo).
    async function submitInlineVote(eventIdx, memberId, value) {
      if (authMode !== 'admin') return;
      const lockKey = `vote-${eventIdx}-${memberId}`;
      if (votingInFlight.has(lockKey)) return;
      const ev = allEvents[eventIdx];
      if (!ev || !ev.eventRecordId) return;
      const member = allMembers.find(m => m.id === memberId);
      if (!member) return;

      votingInFlight.add(lockKey);

      const msgEl = document.getElementById(`inline-vote-msg-${eventIdx}-${memberId}`);
      if (msgEl) { msgEl.className = 'vote-msg'; msgEl.textContent = 'Saving...'; }

      try {
        if (!votesData[ev.eventRecordId]) votesData[ev.eventRecordId] = {};
        const evVotes = votesData[ev.eventRecordId];
        const existing = evVotes[memberId];

        if (value === null) {
          if (existing && existing.recordId) {
            const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}/${existing.recordId}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${API_TOKEN}` },
            });
            if (!res.ok) throw new Error(`Delete failed: HTTP ${res.status}`);
          }
          delete evVotes[memberId];
        } else if (existing && existing.recordId) {
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}/${existing.recordId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { 'VOTE': value } })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
          }
          evVotes[memberId] = { vote: value, recordId: existing.recordId };
        } else {
          // No existing record — POST new (skip the dedup-query optimization
          // since admin edits are rare and the local cache should be fresh enough).
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${VOTES_TABLE}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fields: {
                'MEMBER RECORD ID': memberId,
                'MEMBER NAME': member.fields['FULL NAME'] || '',
                'EVENT RECORD ID': ev.eventRecordId,
                'VOTE': value,
              }
            })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
          }
          const data = await res.json();
          evVotes[memberId] = { vote: value, recordId: data.id };
        }

        // Close the inline editor and re-render so the chip moves to its new tier
        inlineVoteEdit = null;
        render();
      } catch (err) {
        if (msgEl) { msgEl.className = 'vote-msg error'; msgEl.textContent = 'Failed: ' + err.message; }
      } finally {
        votingInFlight.delete(lockKey);
      }
    }

    async function refreshEvents() {
      document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Refreshing...</p></div>';
      editingEvent = null;
      exportState = null;
      showingNewEvent = false;
      showingAttendance = null;
      openEvents.clear();
      try {
        await loadEvents();
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <p>Could not load events</p>
            <p style="font-size:13px;color:#888;margin-top:8px;">${err.message}</p>
            <a href="index.html">&larr; Back to Home</a>
          </div>`;
      }
    }

    applyApprovedChanges().then(() => loadEvents()).catch(err => {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <p>Could not load events</p>
          <p style="font-size:13px;color:#888;margin-top:8px;">${err.message}</p>
          <a href="index.html">&larr; Back to Home</a>
        </div>`;
    });
  </script>
