<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HARUMPHERS Events</title>
  <meta name="theme-color" content="#8B0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    header img { width: 40px; height: 40px; border-radius: 8px; }
    header h1 { font-size: 20px; flex: 1; }

    .header-links {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .back-link, .logout-link {
      color: #FFD700;
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .logout-link { opacity: 0.7; }
    .logout-link:hover { opacity: 1; }

    .content {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .event-card {
      background: #2a2a2a;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .event-header {
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }

    .event-header:active { background: #333; }

    .event-name {
      font-weight: 700;
      font-size: 16px;
      flex: 1;
    }

    .event-date {
      font-size: 13px;
      color: #aaa;
      margin-top: 2px;
    }

    .event-status {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-upcoming { background: #FFD700; color: #8B0000; }
    .status-past { background: #555; color: #ccc; }
    .status-active { background: #4CAF50; color: #fff; }

    .event-counts {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: #aaa;
      margin-top: 6px;
    }

    .count-yes { color: #4CAF50; }
    .count-no { color: #ff6b6b; }
    .count-maybe { color: #FFD700; }

    .chevron {
      color: #666;
      font-size: 20px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .event-card.open .chevron { transform: rotate(90deg); }

    .event-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .event-card.open .event-body { max-height: 5000px; }

    .rsvp-section {
      padding: 0 16px 12px;
    }

    .rsvp-label {
      font-size: 13px;
      font-weight: 600;
      padding: 8px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .rsvp-label.yes { color: #4CAF50; }
    .rsvp-label.no { color: #ff6b6b; }
    .rsvp-label.maybe { color: #FFD700; }
    .rsvp-label.pending { color: #888; }

    .rsvp-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 4px;
    }

    .rsvp-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rsvp-chip {
      background: #333;
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 13px;
      display: inline-block;
    }

    .rsvp-chip.yes { background: rgba(76,175,80,0.15); color: #81C784; }
    .rsvp-chip.no { background: rgba(255,107,107,0.15); color: #ff8a8a; }
    .rsvp-chip.maybe { background: rgba(255,215,0,0.15); color: #FFD700; }
    .rsvp-chip.pending { background: rgba(255,165,0,0.15); color: #FFA500; }

    .rsvp-chip.you {
      border: 2px solid #FFD700;
      font-weight: 600;
    }

    .rsvp-chip.clickable {
      cursor: pointer;
      transition: all 0.15s;
    }

    .rsvp-chip.clickable:active { opacity: 0.7; }

    .rsvp-chip.editing {
      border: 2px solid #FFD700;
      background: rgba(255,215,0,0.1) !important;
    }

    /* Inline edit panel (expands under a member's name) */
    .inline-edit {
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 10px 12px;
      margin: 4px 0 8px;
    }

    .inline-edit-name {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .inline-edit .rsvp-buttons {
      display: flex;
      gap: 6px;
    }

    .inline-edit .rsvp-btn {
      flex: 1;
      padding: 8px 4px;
      font-size: 12px;
    }

    .inline-edit .guest-count-row {
      margin-top: 8px;
    }

    .inline-edit .rsvp-msg {
      font-size: 12px;
      min-height: 18px;
    }

    .no-rsvp {
      font-size: 13px;
      color: #666;
      font-style: italic;
      padding: 4px 0;
    }

    .rsvp-form {
      padding: 12px 16px 16px;
      border-top: 1px solid #333;
    }

    .rsvp-form-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #FFD700;
    }

    .rsvp-buttons {
      display: flex;
      gap: 8px;
    }

    .rsvp-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid transparent;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .rsvp-btn:active { opacity: 0.7; }
    .rsvp-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .rsvp-btn.yes-btn { background: #4CAF50; color: #fff; }
    .rsvp-btn.maybe-btn { background: #FFD700; color: #8B0000; }
    .rsvp-btn.no-btn { background: #ff6b6b; color: #fff; }
    .rsvp-btn.clear-btn { background: #555; color: #ccc; font-size: 12px; flex: 0.6; }

    .rsvp-btn.active {
      border-color: #fff;
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .guest-count-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .guest-count-label {
      font-size: 14px;
      color: #aaa;
      flex-shrink: 0;
    }

    .guest-count-input {
      width: 60px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 15px;
      text-align: center;
      outline: none;
    }

    .guest-count-input:focus { border-color: #FFD700; }

    .guest-count-display {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }

    .rsvp-msg {
      text-align: center;
      padding: 8px 0 0;
      font-size: 13px;
      min-height: 24px;
    }

    .rsvp-msg.success { color: #4CAF50; }
    .rsvp-msg.error { color: #ff6b6b; }

    .your-rsvp {
      font-size: 13px;
      color: #aaa;
      margin-top: 4px;
    }

    .your-rsvp strong { color: #FFD700; }

    .loading, .error {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top-color: #FFD700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error { color: #ff6b6b; }
    .error a { color: #FFD700; display: inline-block; margin-top: 12px; }

    /* Export feature (admin only) */
    .export-btn {
      background: #444;
      color: #FFD700;
      border: 1px solid #666;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .export-btn:active { opacity: 0.7; }

    .export-panel {
      background: #1f1f1f;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 14px;
      margin: 8px 16px 12px;
    }

    .export-panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 10px;
    }

    .export-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 8px;

    .export-row-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      width: 100%;
      margin-bottom: 2px;
    }

    .export-filter-btn, .export-action-btn {
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #555;
      background: #333;
      color: #ccc;
      font-family: inherit;
    }

    .export-filter-btn.active {
      border-color: #FFD700;
      color: #FFD700;
      background: rgba(255,215,0,0.1);
    }

    .export-action-btn { color: #fff; }
    .export-action-btn.email { background: #2a6496; border-color: #2a6496; }
    .export-action-btn.sms { background: #4CAF50; border-color: #4CAF50; }
    .export-action-btn.copy { background: #555; border-color: #666; }

    .export-action-btn:active { opacity: 0.7; }

    .export-msg {
      font-size: 12px;
      color: #4CAF50;
      min-height: 18px;
      margin-top: 4px;
    }

    .export-count {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
    }

    /* Admin event editing */
    .edit-icon-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      flex-shrink: 0;
    }
    .edit-icon-btn:active { color: #FFD700; }

    .event-edit-form {
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .event-edit-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-edit-label {
      font-size: 12px;
      color: #888;
      width: 50px;
      flex-shrink: 0;
    }

    .event-edit-input, .event-edit-select {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .event-edit-input:focus, .event-edit-select:focus { border-color: #FFD700; }

    .event-edit-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .edit-save-btn, .edit-cancel-btn {
      padding: 6px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .edit-save-btn { background: #4CAF50; color: #fff; }
    .edit-save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .edit-cancel-btn { background: #555; color: #ccc; }

    /* New event form */
    .new-event-bar { margin-bottom: 16px; }

    .new-event-toggle {
      background: #8B0000;
      color: #FFD700;
      border: 1px solid #FFD700;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
    }
    .new-event-toggle:active { opacity: 0.7; }

    .new-event-form {
      background: #2a2a2a;
      border: 1px solid #FFD700;
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
    }

    .new-event-form h3 { color: #FFD700; font-size: 16px; margin-bottom: 12px; }

    .new-event-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .new-event-label {
      font-size: 13px;
      color: #aaa;
      width: 80px;
      flex-shrink: 0;
    }

    .new-event-input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .new-event-input:focus { border-color: #FFD700; }

    .new-event-hint {
      font-size: 11px;
      color: #666;
      padding-left: 88px;
      margin-top: -6px;
      margin-bottom: 10px;
    }

    .new-event-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
      padding-left: 88px;
    }

    .new-event-actions { display: flex; gap: 8px; }

    .new-event-create-btn {
      flex: 1;

      background: #4CAF50;
      color: #fff;

      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .new-event-create-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .new-event-cancel-btn {

    }

    .new-event-msg { font-size: 13px; margin-top: 8px; min-height: 20px; }

    .no-events-msg {
      text-align: center;

      font-size: 15px;
    }

    .gallery-section {
      border-top: 1px solid #333;
      padding: 12px 16px;
    }

    .gallery-title {

      font-weight: bold;

    }

</head>
<body>
  <header>
    <img src="apple-touch-icon.png" alt="">
    <h1>Events</h1>
    <div class="header-links">
      <a href="#" class="back-link" onclick="event.preventDefault();refreshEvents()" title="Refresh">&#x21bb;</a>
      <a href="index.html" class="back-link">Home</a>
      <a href="#" class="logout-link" onclick="logout()">Logout</a>
    </div>
  </header>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading events...</p>
    </div>
  </div>

  <script>
    // --- Auth Helpers ---
    function getAuthMode() {
      const auth = localStorage.getItem('harumphers_auth');
      if (auth === 'admin') return 'admin';
      if (auth === 'member') return 'member';
      if (auth === 'guest' || auth === '1') return 'guest';
      return null;
    }

    function getMemberInfo() {
      const recordId = localStorage.getItem('harumphers_member_id');
      const name = localStorage.getItem('harumphers_member_name');
      const duqId = localStorage.getItem('harumphers_duq_id');
      if (!recordId) return null;
      return { recordId, name, duqId };
    }

    function logout() {
      localStorage.removeItem('harumphers_auth');
      localStorage.removeItem('harumphers_member_id');
      localStorage.removeItem('harumphers_member_name');
      localStorage.removeItem('harumphers_duq_id');
      localStorage.removeItem('harumphers_myname');
      window.location.href = 'index.html';
    }

    function requireAuth() {
      if (!getAuthMode()) {
        window.location.href = 'index.html';
        return false;
      }
      return true;
    }

    if (!requireAuth()) throw new Error('Not authenticated');

    const authMode = getAuthMode();
    const myInfo = getMemberInfo();

    const API_TOKEN = 'patUyXb57QcsCO19p.0087dc0d916011881f3d3116ec8f314b422dcd0c05f37c4a5cfd8cd65350a76c';
    const BASE_ID = 'appW7Df1qJlznxxtf';
    const MEMBERS_TABLE = 'tbltzPyERz9wGE0zd';
    const EVENTS_TABLE = 'tblzPscL5Q2a2SZk1';
    const CHANGES_TABLE = 'tbljI55IdCDB0uFuS';
    const PHOTOS_TABLE = 'tblTQM3DY7BAqs9BL';

    let allMembers = [];
    let allEvents = [];
    let galleryPhotos = {}; // eventRecordId -> [{url, thumb, memberName, caption}]

    // Inline edit state: { eventIdx, memberId } or null
    let inlineEdit = null;
    let openEvents = new Set();

    // Export state: { eventIdx, filter } or null
    let exportState = null;
    // Admin edit state
    let editingEvent = null; // eventIdx being edited
    let showingNewEvent = false;

    async function apiFetch(url) {
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${API_TOKEN}` }
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      return res.json();
    }

    async function apiFetchAll(url) {
      let allRecords = [];
      let fetchUrl = url;
      while (true) {
        const data = await apiFetch(fetchUrl);
        allRecords = allRecords.concat(data.records);
        if (!data.offset) break;
        const sep = fetchUrl.includes('?') ? '&' : '?';
        fetchUrl = url + sep + 'offset=' + encodeURIComponent(data.offset);
      }
      return { records: allRecords };
    }

    async function apiPatch(recordId, fields) {
      const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${MEMBERS_TABLE}/${recordId}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `Bearer ${API_TOKEN}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ fields })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      return res.json();
    }

    async function applyApprovedChanges() {
      try {
        const data = await apiFetch(
          `https://api.airtable.com/v0/${BASE_ID}/${CHANGES_TABLE}?filterByFormula=AND({STATUS}="Approved",{APPLIED AT}=BLANK())`
        );
        for (const rec of data.records) {
          const f = rec.fields;
          const memberId = f['MEMBER RECORD ID'];
          const changes = f['REQUESTED CHANGES'] || '';
          if (!memberId) continue;

          const updates = {};
          for (const line of changes.split('\n')) {
            const match = line.match(/^(.+?):\s*.+?\s*->\s*(.+)$/);
            if (!match) continue;
            const field = match[1].trim();
            const newVal = match[2].trim();
            if (field === 'Name') updates['FULL NAME'] = newVal;
            else if (field === 'Phone') updates['CELL #'] = newVal;
            else if (field === 'Email') updates['E-MAIL ADDRESS'] = newVal;
          }

          if (Object.keys(updates).length > 0) {
            await fetch(`https://api.airtable.com/v0/${BASE_ID}/${MEMBERS_TABLE}/${memberId}`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ fields: updates })
            });
          }

          await fetch(`https://api.airtable.com/v0/${BASE_ID}/${CHANGES_TABLE}/${rec.id}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields: { 'APPLIED AT': new Date().toISOString() } })
          });
        }
      } catch (e) {
        console.log('Auto-apply check:', e.message);
      }
    }

    // Find matching guest field using multiple strategies
    function findGuestField(guestFields, fieldWords, matched) {
      for (const gf of guestFields) {
        const guestKey = gf.name.toUpperCase().replace('GUESTS-', '').trim();
        if (fieldWords.some(w => w.length > 2 && (guestKey.includes(w) || w.includes(guestKey)))) {
          return gf.name;
        }
        if (matched && matched['EVENT NAME']) {
          const eventWords = matched['EVENT NAME'].toUpperCase().replace(/[^A-Z\s]/g, '').trim().split(/\s+/);
          if (eventWords.some(w => w.length > 2 && (guestKey.includes(w) || w.includes(guestKey)))) {
            return gf.name;
          }
        }
      }
      return null;
    }

    async function loadEvents() {
      const meta = await apiFetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables`);
      const membersTable = meta.tables.find(t => t.id === MEMBERS_TABLE);
      const rsvpFields = membersTable.fields.filter(f =>
        f.type === 'singleSelect' && f.name.toUpperCase().includes('RSVP')
      );
      const guestFields = membersTable.fields.filter(f =>
        f.name.toUpperCase().startsWith('GUESTS-')
      );

      if (rsvpFields.length === 0) {
        document.getElementById('content').innerHTML = '<div class="loading"><p>No events found</p></div>';
        return;
      }

      const eventsData = await apiFetchAll(
        `https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}`
      );
      const eventDetails = eventsData.records.map(r => ({ _recordId: r.id, ...r.fields }));

      const params = new URLSearchParams({
        'sort[0][field]': 'LAST NAME',
        'sort[0][direction]': 'asc',
      });
      params.append('fields[]', 'FULL NAME');
      params.append('fields[]', 'IN DIRECTORY');
      params.append('fields[]', 'CELL #');
      params.append('fields[]', 'E-MAIL ADDRESS');
      rsvpFields.forEach(f => params.append('fields[]', f.name));
      guestFields.forEach(f => params.append('fields[]', f.name));

      const membersData = await apiFetchAll(
        `https://api.airtable.com/v0/${BASE_ID}/${MEMBERS_TABLE}?${params}`
      );

      allMembers = membersData.records.filter(r => r.fields['IN DIRECTORY']);

      allEvents = rsvpFields.map((field, idx) => {
        const fieldWords = field.name.toUpperCase()
          .replace('RSVP', '').replace(/[^A-Z\s]/g, '').trim().split(/\s+/);

        let matched = eventDetails.find(e => {
          const eName = (e['EVENT NAME'] || '').toUpperCase();
          return fieldWords.some(w => w.length > 2 && eName.includes(w));
        });

        const pairedGuestField = findGuestField(guestFields, fieldWords, matched);

        const yes = [], no = [], maybe = [], pending = [];
        allMembers.forEach(r => {
          const f = r.fields;
          const rsvp = f[field.name];
          const name = f['FULL NAME'] || '';
          const guestCount = pairedGuestField ? (f[pairedGuestField] || 0) : 0;
          const email = f['E-MAIL ADDRESS'] || '';
          const phone = f['CELL #'] || '';
          const entry = { name, guestCount, recordId: r.id, email, phone };
          if (!rsvp) {
            pending.push(entry);
            return;
          }
          const val = rsvp.toUpperCase();
          if (val.includes('YES') || val.includes('GOING')) {
            yes.push(entry);
          } else if (val.includes('NO')) {
            no.push(entry);
          } else {
            maybe.push(entry);
          }
        });

        let displayName = field.name
          .replace(/RSVP$/i, '')
          .replace(/^[A-Z]{3}\d{1,2}[-\s]*/i, '')
          .replace(/[-_]/g, ' ')
          .trim();

        if (matched && matched['EVENT NAME']) {
          displayName = matched['EVENT NAME'];
        }

        const isDone = matched && (matched['Status'] || '').toLowerCase() === 'done';

        // Extract speaker photo thumbnail URL
        let speakerPhotoUrl = null;
        if (matched && matched['SPEAKER PHOTO'] && matched['SPEAKER PHOTO'].length > 0) {
          const photo = matched['SPEAKER PHOTO'][0];
          speakerPhotoUrl = (photo.thumbnails && photo.thumbnails.large) ? photo.thumbnails.large.url : photo.url;
        }

        return {
          name: displayName,
          fieldName: field.name,
          guestFieldName: pairedGuestField,
          date: matched ? (matched['DATE'] || '') : '',
          speaker: matched ? (matched['SPEAKER'] || '') : '',
          time: matched ? (matched['TIME'] || '') : '',
          room: matched ? (matched['ROOM'] || '') : '',
          speakerPhoto: speakerPhotoUrl,
          notes: matched ? (matched['NOTES'] || '') : '',
          status: matched ? (matched['Status'] || '') : '',
          eventRecordId: matched ? matched._recordId : null,
          yes, no, maybe, pending,
          isDone,
        };
      });

      allEvents.sort((a, b) => {
        const aActive = (a.status || '').toLowerCase() !== 'done';
        const bActive = (b.status || '').toLowerCase() !== 'done';
        if (aActive !== bActive) return aActive ? -1 : 1;
        return 0;
      });

      // Load gallery photos for past events
      galleryPhotos = {};
      try {
        const photosData = await apiFetchAll(
          `https://api.airtable.com/v0/${BASE_ID}/${PHOTOS_TABLE}`
        );
        photosData.records.forEach(r => {
          const f = r.fields;
          const eventId = f['EVENT RECORD ID'];
          if (!eventId) return;
          if (!galleryPhotos[eventId]) galleryPhotos[eventId] = [];
          const photos = f['PHOTO'] || [];
          photos.forEach(p => {
            galleryPhotos[eventId].push({
              recordId: r.id,
              url: p.url,
              thumb: (p.thumbnails && p.thumbnails.large) ? p.thumbnails.large.url : p.url,
              memberName: f['MEMBER NAME'] || '',
              caption: f['CAPTION'] || '',
            });
          });
        });
      } catch (e) { /* gallery load failure is non-fatal */ }

      render();
    }

    function getMyRsvpForEvent(ev) {
      if (!myInfo) return null;
      const member = allMembers.find(m => m.id === myInfo.recordId);
      if (!member) return null;
      return member.fields[ev.fieldName] || null;
    }

    function getMyGuestCountForEvent(ev) {
      if (!myInfo || !ev.guestFieldName) return 0;
      const member = allMembers.find(m => m.id === myInfo.recordId);
      if (!member) return 0;
      return member.fields[ev.guestFieldName] || 0;
    }

    function getMemberRsvpForEvent(ev, memberId) {
      const member = allMembers.find(m => m.id === memberId);
      if (!member) return null;
      return member.fields[ev.fieldName] || null;
    }

    function getMemberGuestCount(ev, memberId) {
      if (!ev.guestFieldName) return 0;
      const member = allMembers.find(m => m.id === memberId);
      if (!member) return 0;
      return member.fields[ev.guestFieldName] || 0;
    }

    function toggleEvent(idx) {
      if (openEvents.has(idx)) openEvents.delete(idx);
      else openEvents.add(idx);
      render();
    }

    // Toggle inline edit for a member in an event
    function toggleInlineEdit(eventIdx, memberId) {
      if (inlineEdit && inlineEdit.eventIdx === eventIdx && inlineEdit.memberId === memberId) {
        inlineEdit = null;
      } else {
        inlineEdit = { eventIdx, memberId };
      }
      render();
    }

    function render() {
      const content = document.getElementById('content');

      // Admin: new event button/form
      let topHtml = '';
      if (authMode === 'admin') {
        if (showingNewEvent) {
          topHtml = `<div class="new-event-bar">
            <div class="new-event-form">
              <h3>Add New Event</h3>
              <div class="new-event-row">
                <span class="new-event-label">Name</span>
                <input class="new-event-input" id="new-event-name" placeholder="e.g. Bob Smith Speaker Night">
              </div>
              <div class="new-event-row">
                <span class="new-event-label">Date</span>
                <input class="new-event-input" type="date" id="new-event-date">
              </div>
              <div class="new-event-row">
                <span class="new-event-label">RSVP Field</span>
                <input class="new-event-input" id="new-event-prefix" placeholder="Auto-generated from name + date">
              </div>
              <div class="new-event-hint">Column name in Airtable (auto-fills when you enter name + date)</div>
              <div class="new-event-checkbox">
                <input type="checkbox" id="new-event-guests" checked>
                <label for="new-event-guests">Enable guest count tracking</label>
              </div>
              <div class="new-event-actions">
                <button class="new-event-cancel-btn" onclick="toggleNewEvent()">Cancel</button>
                <button class="new-event-create-btn" id="new-event-create-btn" onclick="createNewEvent()">Create Event</button>
              </div>
              <div class="new-event-msg" id="new-event-msg"></div>
            </div>
          </div>`;
        } else {
          topHtml = `<div class="new-event-bar">
            <button class="new-event-toggle" onclick="toggleNewEvent()">+ Add New Event</button>
          </div>`;
        }
      }

      const eventCards = allEvents.map((ev, i) => {
        // Non-admins: hide todo events (done shown in past section)
        if (authMode !== 'admin') {
          const s = (ev.status || '').toLowerCase();
          if (s === 'todo') return '';
        }

        const sLower = (ev.status || '').toLowerCase();
        const statusClass = sLower === 'done' ? 'past' : sLower === 'in progress' ? 'active' : 'upcoming';
        const statusLabel = ev.status || 'Upcoming';

        function chipHtml(entry, cls) {
          const isYou = myInfo && entry.recordId === myInfo.recordId;
          const youLabel = isYou ? ' (You)' : '';
          const guestLabel = entry.guestCount > 0 ? ` (+${entry.guestCount})` : '';
          const youClass = isYou ? ' you' : '';
          const isEditing = inlineEdit && inlineEdit.eventIdx === i && inlineEdit.memberId === entry.recordId;
          const editingClass = isEditing ? ' editing' : '';
          const clickable = authMode === 'admin' && !ev.isDone ? ' clickable' : '';
          const onclick = clickable ? ` onclick="event.stopPropagation(); toggleInlineEdit(${i}, '${entry.recordId}', event)"` : '';

          let html = `<span class="rsvp-chip ${cls}${youClass}${editingClass}${clickable}"${onclick}>${entry.name}${youLabel}${guestLabel}</span>`;

          // Inline edit panel
          if (isEditing && authMode === 'admin') {
            const memberRsvp = getMemberRsvpForEvent(ev, entry.recordId);
            const memberGuests = getMemberGuestCount(ev, entry.recordId);
            let ac = { yes: '', maybe: '', no: '' };
            if (memberRsvp) {
              const u = memberRsvp.toUpperCase();
              if (u.includes('YES') || u.includes('GOING')) ac.yes = ' active';
              else if (u.includes('NO')) ac.no = ' active';
              else ac.maybe = ' active';
            }

            html += `
              <div class="inline-edit" onclick="event.stopPropagation()">
                <div class="inline-edit-name">Edit: ${entry.name}</div>
                <div class="rsvp-buttons">
                  <button class="rsvp-btn yes-btn${ac.yes}" onclick="submitInlineRsvp(${i}, '${entry.recordId}', 'YES')">YES</button>
                  <button class="rsvp-btn maybe-btn${ac.maybe}" onclick="submitInlineRsvp(${i}, '${entry.recordId}', 'MAYBE')">MAYBE</button>
                  <button class="rsvp-btn no-btn${ac.no}" onclick="submitInlineRsvp(${i}, '${entry.recordId}', 'NO')">NO</button>
                  <button class="rsvp-btn clear-btn" onclick="submitInlineRsvp(${i}, '${entry.recordId}', null)">CLEAR</button>
                </div>
                ${ev.guestFieldName ? `
                  <div class="guest-count-row">
                    <span class="guest-count-label">Guests:</span>
                    <input type="number" class="guest-count-input" id="inline-guests-${i}-${entry.recordId}"
                      value="${memberGuests}" min="0" max="20"
                      onchange="submitInlineGuestCount(${i}, '${entry.recordId}')">
                  </div>
                ` : ''}
                <div class="rsvp-msg" id="inline-msg-${i}-${entry.recordId}"></div>
              </div>`;
          }

          return html;
        }

        function section(label, cls, list) {
          if (list.length === 0) return '';
          return `<div class="rsvp-label ${cls}">${label} (${list.length})</div>
            <div class="rsvp-list">${list.map(entry => chipHtml(entry, cls)).join('')}</div>`;
        }

        const body = [
          section('Going', 'yes', ev.yes),
          section('Maybe', 'maybe', ev.maybe),
          section('Not Going', 'no', ev.no),
          !ev.isDone ? section('Not Responded', 'pending', ev.pending) : '',
        ].filter(Boolean).join('');

        const totalYesGuests = ev.yes.reduce((sum, e) => sum + (e.guestCount || 0), 0);
        const totalMaybeGuests = ev.maybe.reduce((sum, e) => sum + (e.guestCount || 0), 0);
        const total = ev.yes.length + ev.no.length + ev.maybe.length;

        const guestCountNote = totalYesGuests > 0
          ? ` <span style="font-size:11px;color:#888">(+${totalYesGuests + totalMaybeGuests} guests)</span>` : '';

        let rsvpForm = '';

        if (!ev.isDone) {
          if (authMode === 'guest') {
            rsvpForm = '';
          } else if (authMode === 'member') {
            // Member: RSVP buttons + read-only guest count
            const myRsvp = getMyRsvpForEvent(ev);
            const myGuests = getMyGuestCountForEvent(ev);

            let activeClass = { yes: '', maybe: '', no: '' };
            if (myRsvp) {
              const upper = myRsvp.toUpperCase();
              if (upper.includes('YES') || upper.includes('GOING')) activeClass.yes = ' active';
              else if (upper.includes('NO')) activeClass.no = ' active';
              else activeClass.maybe = ' active';
            }

            // Guest count is read-only for members
            const guestDisplay = ev.guestFieldName
              ? `<div class="guest-count-display">Guests: <strong>${myGuests}</strong>${myGuests === 0 ? ' (contact admin to update)' : ''}</div>`
              : '';

            rsvpForm = `
              <div class="rsvp-form" onclick="event.stopPropagation()">
                <div class="rsvp-form-title">Your RSVP</div>
                ${myRsvp ? `<div class="your-rsvp">Current: <strong>${myRsvp}</strong></div>` : '<div class="your-rsvp" style="color:#FFA500">Not yet responded</div>'}
                <div class="rsvp-buttons">
                  <button class="rsvp-btn yes-btn${activeClass.yes}" onclick="submitMemberRsvp(${i}, 'YES')">YES</button>
                  <button class="rsvp-btn maybe-btn${activeClass.maybe}" onclick="submitMemberRsvp(${i}, 'MAYBE')">MAYBE</button>
                  <button class="rsvp-btn no-btn${activeClass.no}" onclick="submitMemberRsvp(${i}, 'NO')">NO</button>
                  ${myRsvp ? `<button class="rsvp-btn clear-btn" onclick="submitMemberRsvp(${i}, null)">CLEAR</button>` : ''}
                </div>
                ${guestDisplay}
                <div class="rsvp-msg" id="rsvp-msg-${i}"></div>
              </div>`;
          } else if (authMode === 'admin') {
            // Admin: own RSVP + own guest count (editable)
            const myRsvp = getMyRsvpForEvent(ev);
            const myGuests = getMyGuestCountForEvent(ev);

            let activeClass = { yes: '', maybe: '', no: '' };
            if (myRsvp) {
              const upper = myRsvp.toUpperCase();
              if (upper.includes('YES') || upper.includes('GOING')) activeClass.yes = ' active';
              else if (upper.includes('NO')) activeClass.no = ' active';
              else activeClass.maybe = ' active';
            }

            const hasOwnRecord = !!myInfo;

            const ownRsvpSection = hasOwnRecord ? `
                <div class="rsvp-form-title">Your RSVP</div>
                ${myRsvp ? `<div class="your-rsvp">Current: <strong>${myRsvp}</strong></div>` : '<div class="your-rsvp" style="color:#FFA500">Not yet responded</div>'}
                <div class="rsvp-buttons">
                  <button class="rsvp-btn yes-btn${activeClass.yes}" onclick="submitMemberRsvp(${i}, 'YES')">YES</button>
                  <button class="rsvp-btn maybe-btn${activeClass.maybe}" onclick="submitMemberRsvp(${i}, 'MAYBE')">MAYBE</button>
                  <button class="rsvp-btn no-btn${activeClass.no}" onclick="submitMemberRsvp(${i}, 'NO')">NO</button>
                  ${myRsvp ? `<button class="rsvp-btn clear-btn" onclick="submitMemberRsvp(${i}, null)">CLEAR</button>` : ''}
                </div>
                ${ev.guestFieldName ? `
                  <div class="guest-count-row">
                    <span class="guest-count-label">Your guests:</span>
                    <input type="number" class="guest-count-input" id="guest-count-${i}"
                      value="${myGuests}" min="0" max="20"
                      onchange="submitGuestCount(${i})">
                  </div>
                ` : ''}
                <div class="rsvp-msg" id="rsvp-msg-${i}"></div>
                <div style="border-top:1px solid #444;margin-top:12px;padding-top:8px;font-size:12px;color:#666;text-align:center">Tap any member name above to edit their RSVP</div>
            ` : `<div style="font-size:12px;color:#666;text-align:center;padding:8px 0">Tap any member name above to edit their RSVP</div>`;

            rsvpForm = `
              <div class="rsvp-form" onclick="event.stopPropagation()">
                ${ownRsvpSection}
              </div>`;
          }
        }

        // Export panel (admin only)
        let exportPanel = '';
        if (authMode === 'admin' && exportState && exportState.eventIdx === i) {
          const f = exportState.filter;
          const list = getExportList(i, f);
          const emailCount = list.filter(e => e.email).length;
          const phoneCount = list.filter(e => e.phone).length;
          const filterLabels = { yes: 'Going', maybe: 'Maybe', no: 'Not Going', pending: 'Not Responded', all: 'All' };

          exportPanel = `
            <div class="export-panel" onclick="event.stopPropagation()">
              <div class="export-panel-title">Export List</div>
              <div class="export-row">
                <div class="export-row-label">Filter</div>
                <button class="export-filter-btn${f === 'yes' ? ' active' : ''}" onclick="setExportFilter(${i}, 'yes')">Going (${ev.yes.length})</button>
                <button class="export-filter-btn${f === 'maybe' ? ' active' : ''}" onclick="setExportFilter(${i}, 'maybe')">Maybe (${ev.maybe.length})</button>
                <button class="export-filter-btn${f === 'no' ? ' active' : ''}" onclick="setExportFilter(${i}, 'no')">No (${ev.no.length})</button>
                <button class="export-filter-btn${f === 'pending' ? ' active' : ''}" onclick="setExportFilter(${i}, 'pending')">No Reply (${ev.pending.length})</button>
                <button class="export-filter-btn${f === 'all' ? ' active' : ''}" onclick="setExportFilter(${i}, 'all')">All (${ev.yes.length + ev.maybe.length + ev.no.length + ev.pending.length})</button>
              </div>
              <div class="export-count">${filterLabels[f]}: ${list.length} members (${emailCount} emails, ${phoneCount} phones)</div>
              <div class="export-row">
                <div class="export-row-label">Action</div>
                <button class="export-action-btn email" onclick="exportEmail(${i})">Email</button>
                <button class="export-action-btn sms" onclick="exportSms(${i})">Text</button>
                <button class="export-action-btn copy" onclick="exportCopyEmails(${i})">Copy Emails</button>
                <button class="export-action-btn copy" onclick="exportCopyPhones(${i})">Copy Phones</button>
              </div>
              <div class="export-msg" id="export-msg-${i}"></div>
            </div>`;
        }

        // Admin edit form for event details
        let editForm = '';
        if (authMode === 'admin' && editingEvent === i) {
          const eName = ev.name.replace(/"/g, '&quot;');
          const eDate = (ev.date || '').replace(/"/g, '&quot;');
          const eSpeaker = (ev.speaker || '').replace(/"/g, '&quot;');
          const eTime = (ev.time || '').replace(/"/g, '&quot;');
          const eRoom = (ev.room || '').replace(/"/g, '&quot;');
          const eStat = (ev.status || '').toLowerCase();
          editForm = `
            <div class="event-edit-form" onclick="event.stopPropagation()">
              <div class="event-edit-row">
                <span class="event-edit-label">Name</span>
                <input class="event-edit-input" id="edit-name-${i}" value="${eName}">
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Speaker</span>
                <input class="event-edit-input" id="edit-speaker-${i}" value="${eSpeaker}" placeholder="Speaker name">
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Date</span>
                <input class="event-edit-input" id="edit-date-${i}" value="${eDate}">
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Time</span>
                <input class="event-edit-input" id="edit-time-${i}" value="${eTime}" placeholder="e.g. 5:30 PM">
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Room</span>
                <input class="event-edit-input" id="edit-room-${i}" value="${eRoom}" placeholder="e.g. Walnut Room">
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Photo</span>
                <div style="flex:1;display:flex;flex-direction:column;gap:6px">
                  <input class="event-edit-input" id="edit-photo-url-${i}" placeholder="Paste image URL" style="margin:0">
                  <div style="display:flex;align-items:center;gap:8px">
                    <label style="font-size:12px;color:#FFD700;cursor:pointer;white-space:nowrap">
                      <input type="file" accept="image/*" id="edit-photo-file-${i}" style="display:none" onchange="handlePhotoFile(${i})">
                      Or choose file
                    </label>
                    <span id="edit-photo-filename-${i}" style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
                  </div>
                  ${ev.speakerPhoto ? `<div style="margin-top:4px;display:flex;align-items:center;gap:8px">
                    <img src="${ev.speakerPhoto}" style="width:48px;height:48px;border-radius:8px;object-fit:cover">
                    <button onclick="event.stopPropagation();removeSpeakerPhoto(${i})" style="background:#8B0000;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer">Remove</button>
                  </div>` : ''}
                </div>
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Notes</span>
                <textarea class="event-edit-input" id="edit-notes-${i}" rows="3" placeholder="Event notes" style="resize:vertical">${(ev.notes || '').replace(/</g, '&lt;')}</textarea>
              </div>
              <div class="event-edit-row">
                <span class="event-edit-label">Status</span>
                <select class="event-edit-select" id="edit-status-${i}">
                  <option value=""${!ev.status || eStat === 'upcoming' ? ' selected' : ''}>Upcoming</option>
                  <option value="Todo"${eStat === 'todo' ? ' selected' : ''}>Todo</option>
                  <option value="In progress"${eStat === 'in progress' ? ' selected' : ''}>In Progress</option>
                  <option value="Done"${eStat === 'done' ? ' selected' : ''}>Done</option>
                </select>
              </div>
              <div class="event-edit-actions">
                <button class="edit-cancel-btn" onclick="cancelEditEvent()">Cancel</button>
                <button class="edit-save-btn" id="edit-save-${i}" onclick="saveEventDetails(${i})">Save</button>
              </div>
              <div class="rsvp-msg" id="edit-msg-${i}"></div>
            </div>`;
        }

        // Admin toolbar (inside expanded body)
        const adminToolbar = authMode === 'admin' ? `
          <div style="display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid #333">
            <button class="export-btn" onclick="toggleEditEvent(${i})">${editingEvent === i ? 'Close Edit' : 'Edit'}</button>
            <button class="export-btn" onclick="toggleExport(${i})">${exportState && exportState.eventIdx === i ? 'Close Export' : 'Export'}</button>
          </div>` : '';

        const isOpen = openEvents.has(i) ? ' open' : '';
        const speakerPhotoHtml = ev.speakerPhoto
          ? `<img src="${ev.speakerPhoto}" alt="" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0">`
          : '';
        const detailParts = [ev.speaker, ev.time, ev.room].filter(Boolean);
        const detailLine = detailParts.length > 0
          ? `<div style="font-size:12px;color:#aaa;margin-top:2px">${detailParts.join(' &bull; ')}</div>`
          : '';
        return `<div class="event-card${isOpen}">
          <div class="event-header" onclick="toggleEvent(${i})">
            ${speakerPhotoHtml}
            <div style="flex:1;min-width:0">
              <div class="event-name">${ev.name}</div>
              ${ev.date ? `<div class="event-date">${ev.date}</div>` : ''}
              ${detailLine}
              <div class="event-counts">
                <span class="count-yes">${ev.yes.length} going</span>
                <span class="count-maybe">${ev.maybe.length} maybe</span>
                <span class="count-no">${ev.no.length} no</span>
                <span>${total} responded${guestCountNote}</span>
              </div>
            </div>
            <span class="event-status status-${statusClass}">${statusLabel}</span>
            <span class="chevron">&#8250;</span>
          </div>
          <div class="event-body">
            ${adminToolbar}
            ${editForm}
            ${exportPanel}
            ${ev.speakerPhoto ? `<div style="text-align:center;padding:12px 16px 0"><img src="${ev.speakerPhoto}" alt="${ev.speaker || 'Speaker'}" style="width:120px;height:120px;border-radius:12px;object-fit:cover"></div>` : ''}
            ${ev.notes ? `<div style="padding:8px 16px;font-size:13px;color:#ccc;border-bottom:1px solid #333">${ev.notes.replace(/\n/g, '<br>')}</div>` : ''}
            <div class="rsvp-section">
              ${body || '<div class="no-rsvp">No RSVPs yet</div>'}
            </div>
            ${rsvpForm}
            ${buildGalleryHtml(ev, i)}
          </div>
        </div>`;
      });

      // Split into active and past events
      const activeCards = [];
      const pastCards = [];
      allEvents.forEach((ev, i) => {
        const card = eventCards[i];
        if (!card) return; // filtered out (non-admin viewing todo/done)
        if (ev.isDone) {
          pastCards.push(card);
        } else {
          activeCards.push(card);
        }
      });

      let eventsHtml = activeCards.join('');
      if (pastCards.length > 0) {
        eventsHtml += `<div style="margin-top:24px;padding:12px 0;border-top:2px solid #444">
          <h2 style="font-size:16px;color:#888;margin:0 0 12px;text-transform:uppercase;letter-spacing:1px">Past Events</h2>
          ${pastCards.join('')}
        </div>`;
      }

      content.innerHTML = topHtml + eventsHtml;

      // Non-admin: show message if no visible events at all
      if (authMode !== 'admin') {
        const hasVisible = allEvents.some(ev => {
          const s = (ev.status || '').toLowerCase();
          return s !== 'todo';
        });
        if (!hasVisible) {
          content.innerHTML += '<div class="no-events-msg">No events right now. Check back soon!</div>';
        }
      }

      // Auto-fill RSVP field name when new event form is showing
      if (showingNewEvent) {
        const nameInput = document.getElementById('new-event-name');
        const dateInput = document.getElementById('new-event-date');
        const prefixInput = document.getElementById('new-event-prefix');
        if (nameInput && dateInput && prefixInput) {
          const autoFill = () => {
            const n = nameInput.value.trim().toUpperCase();
            const d = dateInput.value;
            if (n && d) {
              const dt = new Date(d + 'T12:00:00');
              const mon = dt.toLocaleDateString('en-US', { month: 'short' }).toUpperCase();
              const day = dt.getDate();
              prefixInput.value = `${mon}${day}-${n} RSVP`;
            }
          };
          nameInput.addEventListener('input', autoFill);
          dateInput.addEventListener('input', autoFill);
        }
      }
    }

    function recalcEvent(ev) {
      ev.yes = []; ev.no = []; ev.maybe = []; ev.pending = [];
      allMembers.forEach(r => {
        const f = r.fields;
        const rsvp = f[ev.fieldName];
        const name = f['FULL NAME'] || '';
        const guestCount = ev.guestFieldName ? (f[ev.guestFieldName] || 0) : 0;
        const email = f['E-MAIL ADDRESS'] || '';
        const phone = f['CELL #'] || '';
        const entry = { name, guestCount, recordId: r.id, email, phone };
        if (!rsvp) {
          ev.pending.push(entry);
          return;
        }
        const val = rsvp.toUpperCase();
        if (val.includes('YES') || val.includes('GOING')) {
          ev.yes.push(entry);
        } else if (val.includes('NO')) {
          ev.no.push(entry);
        } else {
          ev.maybe.push(entry);
        }
      });
    }

    function getExportList(eventIdx, filter) {
      const ev = allEvents[eventIdx];
      switch (filter) {
        case 'yes': return ev.yes;
        case 'maybe': return ev.maybe;
        case 'no': return ev.no;
        case 'pending': return ev.pending;
        case 'all': return [...ev.yes, ...ev.maybe, ...ev.no, ...ev.pending];
        default: return ev.yes;
      }
    }

    function exportEmail(eventIdx) {
      const list = getExportList(eventIdx, exportState.filter);
      const emails = list.map(e => e.email).filter(Boolean);
      if (emails.length === 0) {
        showExportMsg(eventIdx, 'No email addresses found', true);
        return;
      }
      window.location.href = 'mailto:' + emails.join(',');
      showExportMsg(eventIdx, `Opening email for ${emails.length} recipient${emails.length > 1 ? 's' : ''}`);
    }

    function exportSms(eventIdx) {
      const list = getExportList(eventIdx, exportState.filter);
      const phones = list.map(e => e.phone).filter(Boolean);
      if (phones.length === 0) {
        showExportMsg(eventIdx, 'No phone numbers found', true);
        return;
      }
      if (phones.length === 1) {
        // Single recipient: sms: URI works reliably
        window.location.href = 'sms:' + phones[0];
        showExportMsg(eventIdx, 'Opening messages');
      } else {
        // Group SMS URIs are unreliable on iOS — copy numbers instead
        copyToClipboard(phones.join(', '), eventIdx,
          `${phones.length} numbers copied — paste into group message`);
      }
    }

    function copyToClipboard(text, eventIdx, successMsg) {
      // Try modern API first, then iOS-compatible fallback
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          showExportMsg(eventIdx, successMsg);
        }).catch(() => {
          fallbackCopy(text, eventIdx, successMsg);
        });
      } else {
        fallbackCopy(text, eventIdx, successMsg);
      }
    }

    function fallbackCopy(text, eventIdx, successMsg) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '0';
      ta.style.top = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      // iOS Safari requires setSelectionRange
      ta.setSelectionRange(0, text.length);
      try {
        document.execCommand('copy');
        showExportMsg(eventIdx, successMsg);
      } catch (e) {
        showExportMsg(eventIdx, 'Copy failed — tap and hold to select text', true);
      }
      document.body.removeChild(ta);
    }

    function exportCopyEmails(eventIdx) {
      const list = getExportList(eventIdx, exportState.filter);
      const emails = list.map(e => e.email).filter(Boolean);
      if (emails.length === 0) {

        return;
      }
      copyToClipboard(emails.join('; '), eventIdx,
        `${emails.length} email${emails.length > 1 ? 's' : ''} copied`);

    function exportCopyPhones(eventIdx) {

      if (phones.length === 0) {

    }

    async function submitGalleryPhoto(eventIdx, fileInput) {
      const ev = allEvents[eventIdx];
      if (!ev.eventRecordId || !fileInput.files.length) return;
      const file = fileInput.files[0];
      const caption = (document.getElementById(`gallery-caption-${eventIdx}`) || {}).value || '';
      const msgEl = document.getElementById(`gallery-msg-${eventIdx}`);
      const memberName = myInfo ? myInfo.name : 'Guest';

      if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Uploading photo...'; }

      try {
        // Upload to temp host
        const publicUrl = await uploadPhotoFile(file);

        // Create record in EVENT PHOTOS table
        const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${PHOTOS_TABLE}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: {
              'EVENT RECORD ID': ev.eventRecordId,
              'EVENT NAME': ev.name,
              'MEMBER NAME': memberName,
              'PHOTO': [{ url: publicUrl }],
              'CAPTION': caption,
              'SUBMITTED': new Date().toLocaleDateString('en-US', { timeZone: 'America/New_York' }),
            }
          })
        });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error ? errData.error.message : `HTTP ${res.status}`);
        }

        // Add to local gallery data
        const data = await res.json();
        if (!galleryPhotos[ev.eventRecordId]) galleryPhotos[ev.eventRecordId] = [];
        const newPhotos = data.fields['PHOTO'] || [];
        newPhotos.forEach(p => {
          galleryPhotos[ev.eventRecordId].push({
            recordId: data.id,
            url: p.url,
            thumb: (p.thumbnails && p.thumbnails.large) ? p.thumbnails.large.url : p.url,
            memberName,
            caption,
          });
        });

        if (msgEl) { msgEl.style.color = '#4CAF50'; msgEl.textContent = 'Photo added!'; }
        fileInput.value = '';
        const captionInput = document.getElementById(`gallery-caption-${eventIdx}`);
        if (captionInput) captionInput.value = '';
        render();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Upload failed: ' + err.message; }
      }
    }

    async function uploadPhotoFile(file) {
      // Upload to tmpfiles.org (free, no API key, 1 hour expiry — enough for Airtable to download)
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch('https://tmpfiles.org/api/v1/upload', {
        method: 'POST',
        body: formData,
      });
      if (!res.ok) throw new Error('Photo upload failed');
      const data = await res.json();
      // tmpfiles.org returns URL like https://tmpfiles.org/12345/image.jpg
      // Direct download URL is https://tmpfiles.org/dl/12345/image.jpg
      const url = data.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
      return url;
    }

    async function saveEventDetails(eventIdx) {
      const ev = allEvents[eventIdx];
      const name = document.getElementById(`edit-name-${eventIdx}`).value.trim();
      const speaker = document.getElementById(`edit-speaker-${eventIdx}`).value.trim();
      const date = document.getElementById(`edit-date-${eventIdx}`).value.trim();
      const time = document.getElementById(`edit-time-${eventIdx}`).value.trim();
      const room = document.getElementById(`edit-room-${eventIdx}`).value.trim();
      const notes = document.getElementById(`edit-notes-${eventIdx}`).value.trim();
      const photoUrl = document.getElementById(`edit-photo-url-${eventIdx}`).value.trim();
      const status = document.getElementById(`edit-status-${eventIdx}`).value;
      const msgEl = document.getElementById(`edit-msg-${eventIdx}`);
      const saveBtn = document.getElementById(`edit-save-${eventIdx}`);

      if (!name) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Name is required'; }
        return;
      }

      if (saveBtn) saveBtn.disabled = true;
      if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Saving...'; }

      try {
        const fields = {
          'EVENT NAME': name,
          'Status': status || null,
          'NOTES': notes || null,
          'DATE': date || null,
          'SPEAKER': speaker || null,
          'TIME': time || null,
          'ROOM': room || null,
        };

        // Handle photo: file upload takes precedence over URL
        let finalPhotoUrl = photoUrl;
        if (pendingPhotoFiles[eventIdx]) {
          if (msgEl) msgEl.textContent = 'Uploading photo...';
          finalPhotoUrl = await uploadPhotoFile(pendingPhotoFiles[eventIdx]);
          delete pendingPhotoFiles[eventIdx];
        }
        if (finalPhotoUrl) {
          fields['SPEAKER PHOTO'] = [{ url: finalPhotoUrl }];
        }

        if (ev.eventRecordId) {
          // Update existing EVENTS record
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}/${ev.eventRecordId}`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg = errData.error ? errData.error.message : `HTTP ${res.status}`;
            throw new Error(errMsg);
          }
        } else {
          // Create new EVENTS record for this RSVP field
          const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ fields })
          });
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg = errData.error ? errData.error.message : `HTTP ${res.status}`;
            throw new Error(errMsg);
          }
          const data = await res.json();
          ev.eventRecordId = data.id;
        }

        // Update local state
        ev.name = name;
        ev.speaker = speaker;
        ev.date = date;
        ev.time = time;
        ev.room = room;
        ev.notes = notes;
        ev.status = status;
        ev.isDone = status.toLowerCase() === 'done';
        if (finalPhotoUrl) ev.speakerPhoto = finalPhotoUrl;
        editingEvent = null;
        render();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Save failed: ' + err.message; }
        if (saveBtn) saveBtn.disabled = false;
      }
    }

    async function createNewEvent() {
      const name = document.getElementById('new-event-name').value.trim();
      const date = document.getElementById('new-event-date').value;
      const prefix = document.getElementById('new-event-prefix').value.trim();
      const enableGuests = document.getElementById('new-event-guests').checked;
      const msgEl = document.getElementById('new-event-msg');
      const createBtn = document.getElementById('new-event-create-btn');

      if (!name || !date || !prefix) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = 'Please fill in all fields'; }
        return;
      }

      // Validate prefix ends with RSVP
      const rsvpFieldName = prefix.toUpperCase().endsWith('RSVP') ? prefix.toUpperCase() : prefix.toUpperCase() + ' RSVP';

      if (createBtn) createBtn.disabled = true;
      if (msgEl) { msgEl.style.color = '#aaa'; msgEl.textContent = 'Creating RSVP field...'; }

      try {
        // Step 1: Create singleSelect RSVP field on Members table
        const fieldRes = await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: rsvpFieldName,
            type: 'singleSelect',
            options: {
              choices: [
                { name: 'YES', color: 'greenLight2' },
                { name: 'NO', color: 'redLight2' },
                { name: 'MAYBE', color: 'yellowLight2' }
              ]
            }
          })
        });

        if (!fieldRes.ok) {
          const errData = await fieldRes.json().catch(() => ({}));
          if (fieldRes.status === 403 || fieldRes.status === 422) {
            throw new Error('Token needs schema.bases:write scope. Update token at airtable.com/create/tokens');
          }
          throw new Error(errData.error?.message || `Field creation failed (${fieldRes.status})`);
        }

        // Step 2: Optionally create guest count field
        if (enableGuests) {
          if (msgEl) msgEl.textContent = 'Creating guest field...';
          const nameWords = name.toUpperCase().split(/\s+/);
          const guestKey = nameWords[0].length > 2 ? nameWords[0] : nameWords.slice(0, 2).join('');
          const guestFieldName = `GUESTS-${guestKey}`;

          await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${MEMBERS_TABLE}/fields`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: guestFieldName, type: 'number', options: { precision: 0 } })
          });
        }

        // Step 3: Create EVENTS table record
        if (msgEl) msgEl.textContent = 'Creating event record...';
        await fetch(`https://api.airtable.com/v0/${BASE_ID}/${EVENTS_TABLE}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fields: { 'EVENT NAME': name, 'DATE': date }
          })
        });

        // Reload everything
        if (msgEl) { msgEl.style.color = '#4CAF50'; msgEl.textContent = 'Event created! Reloading...'; }
        showingNewEvent = false;
        await loadEvents();
      } catch (err) {
        if (msgEl) { msgEl.style.color = '#ff6b6b'; msgEl.textContent = err.message; }
        if (createBtn) createBtn.disabled = false;
      }
    }

    function showExportMsg(eventIdx, msg, isError) {
      const el = document.getElementById(`export-msg-${eventIdx}`);
      if (el) {
        el.style.color = isError ? '#ff6b6b' : '#4CAF50';
        el.textContent = msg;
        if (!isError) setTimeout(() => { if (el) el.textContent = ''; }, 3000);
      }
    }

    async function refreshEvents() {
      document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Refreshing...</p></div>';
      editingEvent = null;
      exportState = null;
      showingNewEvent = false;
      openEvents.clear();
      try {
        await loadEvents();
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <p>Could not load events</p>
            <p style="font-size:13px;color:#888;margin-top:8px;">${err.message}</p>
            <a href="index.html">&larr; Back to Home</a>
          </div>`;
      }
    }

    applyApprovedChanges().then(() => loadEvents()).catch(err => {
      document.getElementById('content').innerHTML = `
        <div class="error">
          <p>Could not load events</p>
          <p style="font-size:13px;color:#888;margin-top:8px;">${err.message}</p>
          <a href="index.html">&larr; Back to Home</a>
        </div>`;
    });
  </script>
</body>
</html>
